    <style>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            databaseURL: "https://icarus2-50e01-default-rtdb.firebaseio.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };

        let globalFirebase = null;
        function getFirebaseContext() {
            if (globalFirebase) return globalFirebase;
            const app = window.FirebaseSDK.initializeApp(firebaseConfig);
            const auth = window.FirebaseSDK.getAuth(app);
            let db;
            try {
                db = window.FirebaseSDK.initializeFirestore(app, {
                    localCache: window.FirebaseSDK.persistentLocalCache({
                        tabManager: window.FirebaseSDK.persistentMultipleTabManager()
                    })
                });
            } catch (e) {
                db = window.FirebaseSDK.getFirestore(app);
            }
            globalFirebase = { app, auth, db };
            return globalFirebase;
        }

        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const gcj02towgs84 = (lng, lat) => {
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };
            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };
            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [lng * 2 - mglng, lat * 2 - mglat];
        };

        const wgs84togcj02 = (lng, lat) => {
            if (lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271) return [lng, lat];
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };
            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };
            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [mglng, mglat];
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const decoratorLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '&copy; 高德地圖'
                }).addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map || !tempMarker) return;
                if (tempMarkerRef.current) { map.removeLayer(tempMarkerRef.current); }
                const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-xl bg-red-500 animate-bounce">📍</div>`;
                const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32] });
                const [gLng, gLat] = wgs84togcj02(tempMarker.lng, tempMarker.lat);
                const marker = L.marker([gLat, gLng], { icon: customIcon }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map);
                marker.openPopup();
                map.setView([gLat, gLng], 15, { animate: true });
                tempMarkerRef.current = marker;
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => {
                         const [gLng, gLat] = wgs84togcj02(p.lng, p.lat);
                         return [gLat, gLng];
                     }));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6';
                const validPlaces = places.filter(p => p.lat && p.lng);
                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode || 'drive'}-${p.routeIndex || 0}`)) + markerColor;
                
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => {
                    if (map.hasLayer(markersRef.current[id].marker)) map.removeLayer(markersRef.current[id].marker);
                    delete markersRef.current[id];
                });
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline);
                    if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main);
                    if (decoratorLayersRef.current[key]) map.removeLayer(decoratorLayersRef.current[key]);
                    delete routeLayersRef.current[key];
                    delete decoratorLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    const posCounter = {};
                    const offsetStep = 0.00018; // 約 20 公尺

                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        let [gLng, gLat] = wgs84togcj02(place.lng, place.lat);
                        const posKey = `${place.lng.toFixed(6)},${place.lat.toFixed(6)}`;
                        
                        if (!posCounter[posKey]) {
                            posCounter[posKey] = 0;
                        } else {
                            posCounter[posKey]++;
                            const angle = (posCounter[posKey] * (Math.PI * 2)) / 8;
                            gLng += Math.cos(angle) * offsetStep;
                            gLat += Math.sin(angle) * offsetStep;
                        }

                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.4);' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 16] });
                        
                        const marker = L.marker([gLat, gLng], { 
                            icon: customIcon, 
                            zIndexOffset: isHovered ? 10000 : (index * 10) 
                        }).addTo(map);
                        
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i]; const p2 = validPlaces[i + 1];
                                const segmentKey = `${p1.id}-${p2.id}`;
                                const travelMode = p1.travelMode || 'drive';
                                
                                let geoData = ['straight_line'];
                                if (travelMode !== 'straight') {
                                    const profile = travelMode === 'walk' ? 'foot' : 'driving';
                                    const url = `https://router.project-osrm.org/route/v1/${profile}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson`;
                                    try {
                                        const res = await fetch(url);
                                        const data = await res.json();
                                        if (data.code === 'Ok') geoData = [data.routes[0].geometry];
                                    } catch (e) {}
                                }

                                if (!isMounted || !mapInstanceRef.current) return;
                                let outline, main;
                                const mainGeo = geoData[0];

                                if (mainGeo === 'straight_line') {
                                    const [gLng1, gLat1] = wgs84togcj02(p1.lng, p1.lat); const [gLng2, gLat2] = wgs84togcj02(p2.lng, p2.lat);
                                    outline = L.polyline([[gLat1, gLng1], [gLat2, gLng2]], outlineStyle).addTo(mapInstanceRef.current);
                                    main = L.polyline([[gLat1, gLng1], [gLat2, gLng2]], mainStyle).addTo(mapInstanceRef.current);
                                } else {
                                    const geoGCJ = JSON.parse(JSON.stringify(mainGeo));
                                    if(geoGCJ.coordinates) geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                    outline = L.geoJSON(geoGCJ, { style: outlineStyle }).addTo(mapInstanceRef.current);
                                    main = L.geoJSON(geoGCJ, { style: mainStyle }).addTo(mapInstanceRef.current);
                                }
                                
                                if (window.L.PolylineDecorator) {
                                    const arrowDecorator = L.polylineDecorator(main, {
                                        patterns: [{ offset: '5%', repeat: '60px', symbol: L.Symbol.arrowHead({ pixelSize: 10, pathOptions: { color: '#FFFFFF', weight: 2, opacity: 0.9 } }) }]
                                    }).addTo(mapInstanceRef.current);
                                    decoratorLayersRef.current[segmentKey] = arrowDecorator;
                                }

                                main.bringToFront();
                                routeLayersRef.current[segmentKey] = { outline, main, baseColor: routeColor };
                                await new Promise(r => setTimeout(r, 20));
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            useEffect(() => {
                Object.entries(markersRef.current).forEach(([placeId, data]) => {
                    const { marker, index, baseColor } = data;
                    if (!marker) return;
                    const isHovered = hoveredId === placeId;
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${baseColor}; ${isHovered ? 'transform: scale(1.4);' : ''}">${index + 1}</div>`;
                    marker.setIcon(L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 16] }));
                    marker.setZIndexOffset(isHovered ? 10000 : (index * 10));
                    if (isHovered) marker.openPopup(); else marker.closePopup();
                });
            }, [hoveredId]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

        // 核心組件：Dashboard
        function Dashboard({ trips, onCreateTrip, onSelectTrip, onDeleteTrip, onImportTrip, onExportTrip, toast }) {
            const fileInputRef = useRef(null);
            return (
                <div className="flex justify-center h-full bg-[#0f172a] overflow-y-auto w-full relative">
                    {toast && (<div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 border border-slate-700"><span>{toast}</span></div></div>)}
                    <div className="max-w-[960px] w-full px-4 md:px-0">
                        <div className="my-10"><h1 className="text-3xl font-bold mb-4 text-slate-100">我的行程</h1></div>
                        <div className="my-8 flex justify-end gap-3 flex-wrap">
                            <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={onImportTrip} />
                            <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl font-bold border border-slate-600 shadow-lg"><Icons.Upload size={20} /> 匯入行程</button>
                            <button onClick={onCreateTrip} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-900/30 transition-all cursor-pointer"><Icons.Plus size={20} /> 建立新行程</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                            {trips.length === 0 ? (<div className="col-span-full text-center py-20 text-slate-500"><p>目前還沒有行程，開始建立你的第一個旅程吧！</p></div>) : (
                                trips.map((tripData, index) => {
                                    const mockImgNum = (index % 20) + 30; 
                                    return (
                                        <div key={tripData.id} onClick={() => onSelectTrip(tripData.id)} className="relative bg-slate-800 rounded-2xl overflow-hidden shadow-xl border border-slate-700 hover:border-blue-500 transition-all cursor-pointer group flex flex-col h-[280px]">
                                            <div className="h-40 overflow-hidden relative"><img src={`https://assets.funliday.com/trip-default-cover/${mockImgNum}.png`} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" /><div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent"></div></div>
                                            <div className="p-5 flex-1 flex flex-col justify-end bg-slate-800 relative z-10 -mt-4 rounded-t-xl"><h3 className="font-bold text-lg text-slate-100 truncate">{tripData.trip?.title || '未命名行程'}</h3><p className="text-sm text-slate-400 mt-1">{tripData.trip?.dates || '未設定日期'}</p></div>
                                            <div className="absolute top-3 right-3 flex items-start gap-2"><div className="flex -space-x-2">{(tripData.members || []).slice(0, 3).map((m, i) => (<div key={i} className={`w-8 h-8 rounded-full border-2 border-slate-800 flex items-center justify-center text-xs text-white shadow-md ${m.color || 'bg-slate-600'}`}>{m.avatar || '👤'}</div>))}</div><div className="flex flex-col gap-2"><button onClick={(e) => { e.stopPropagation(); onExportTrip(tripData); }} className="w-8 h-8 bg-slate-900/60 hover:bg-blue-500/80 backdrop-blur-sm rounded-full flex items-center justify-center text-white"><Icons.Download size={14} /></button><button onClick={(e) => { e.stopPropagation(); onDeleteTrip(tripData.id); }} className="w-8 h-8 bg-slate-900/60 hover:bg-red-500/80 backdrop-blur-sm rounded-full flex items-center justify-center text-white"><Icons.Trash2 size={14} /></button></div></div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

        // 核心組件：TripPlanner
        function TripPlanner({ tripId, onBack, db, appId, user }) {
            const [trip, setTrip] = useState({ title: '', dates: '', days: [] });
            const [members, setMembers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [shoppingItems, setShoppingItems] = useState([]);
            const [packingList, setPackingList] = useState([]);
            const AMAP_KEY = '3bf27a17038b433640ab774dafa1d0a6'; 
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [activeDayId, setActiveDayId] = useState(1);
            const [panelMode, setPanelMode] = useState('list'); 
            const [newItem, setNewItem] = useState({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            const [hoveredPlaceId, setHoveredPlaceId] = useState(null);

            const [toast, setToast] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [draggedPlaceIndex, setDraggedPlaceIndex] = useState(null);
            const [tempMarker, setTempMarker] = useState(null);
            const [addressSuggestions, setAddressSuggestions] = useState([]);

            const searchTimeoutRef = useRef(null);
            const isDraggingDay = useRef(false);
            const dragStartX = useRef(0);
            const dragScrollLeft = useRef(0);
            const dragHasMoved = useRef(false);

            const [expandedNotes, setExpandedNotes] = useState({});
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showShoppingModal, setShowShoppingModal] = useState(false);
            const [showPackingModal, setShowPackingModal] = useState(false);
            const [showSettlementPlan, setShowSettlementPlan] = useState(false); 
            const [showMemberSettings, setShowMemberSettings] = useState(false);
            const [showDeleteDayConfirm, setShowDeleteDayConfirm] = useState(false);
            const [placeToDelete, setPlaceToDelete] = useState(null);
            const [expenseToDelete, setExpenseToDelete] = useState(null);
            const [shoppingToDelete, setShoppingToDelete] = useState(null);
            const [expenseFilter, setExpenseFilter] = useState('all'); 
            const [packingFilter, setPackingFilter] = useState('all'); 
            const [displayCurrency, setDisplayCurrency] = useState('HKD');
            const [addModalTab, setAddModalTab] = useState('custom');
            const [newPackingItem, setNewPackingItem] = useState({ text: '', owner: '' });

            useEffect(() => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                return window.FirebaseSDK.onSnapshot(tripDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.trip) setTrip(data.trip);
                        if (data.members) setMembers(data.members);
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.shoppingItems) setShoppingItems(data.shoppingItems);
                        if (data.packingList) setPackingList(data.packingList);
                        if (!activeDayId && data.trip?.days?.length > 0) setActiveDayId(data.trip.days[0].id);
                    }
                });
            }, [user, tripId]);

            const pushUpdate = (data) => window.FirebaseSDK.updateDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId), data);
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            const activeDayData = useMemo(() => trip.days?.find(d => d.id === activeDayId) || trip.days?.[0], [trip, activeDayId]);
            const getMemberInfo = useCallback((name) => members.find(m => m.name === name) || { color: 'bg-gray-400', avatar: '👤' }, [members]);

            const handleGlobalPaste = (e) => {
                if (activeTab !== 'itinerary') return;
                const items = e.clipboardData?.items;
                if (!items) return;
                let imageFile = null;
                for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf('image') !== -1) { imageFile = items[i].getAsFile(); break; } }
                if (imageFile) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > 800 || h > 800) { if (w > h) { h *= 800/w; w = 800; } else { w *= 800/h; h = 800; } }
                            canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            
                            let targetId = (panelMode === 'edit' && newItem.id) ? newItem.id : hoveredPlaceId;
                            if (targetId) {
                                const targetPlace = trip.days.flatMap(d => d.places).find(p => p.id === targetId);
                                const targetName = targetPlace?.name;
                                const newDays = trip.days.map(d => ({
                                    ...d,
                                    places: d.places.map(p => (p.id === targetId || (targetName && p.name === targetName)) ? { ...p, image: imageDataUrl } : p)
                                }));
                                pushUpdate({ trip: { ...trip, days: newDays } });
                                showMsg('✅ 圖片已同步同名卡片！');
                            }
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(imageFile);
                }
            };
            useEffect(() => { document.addEventListener('paste', handleGlobalPaste); return () => document.removeEventListener('paste', handleGlobalPaste); }, [activeTab, panelMode, newItem.id, hoveredPlaceId, trip]);

            const handleAddressInput = (e) => {
                const val = e.target.value; setNewItem(p => ({...p, address: val}));
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                if (!val.trim()) { setAddressSuggestions([]); return; }
                searchTimeoutRef.current = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(val)}&offset=5&page=1&key=${AMAP_KEY}`);
                        const data = await res.json();
                        if (data.status === '1' && data.pois) setAddressSuggestions(data.pois);
                    } catch(e) {}

            };

            const handleSuggestionClick = (s) => {
                const name = s.name;
                const addr = s.address && s.address.length > 0 ? s.address : s.adname;

                if (s.location) {
                    const [lngStr, latStr] = s.location.split(',');
                    setTempMarker({ lat: parseFloat(latStr), lng: parseFloat(lngStr), name });

                setAddressSuggestions([]);

            const handleAddressSearch = async () => {
                if (!newItem.address) return showMsg("請先輸入地址！");
                try {
                    const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(newItem.address)}&offset=1&page=1&key=${AMAP_KEY}`);
                    const data = await res.json();
                    if (data.status === '1' && data.pois?.length > 0) {
                        const s = data.pois[0];
                        const [lngStr, latStr] = s.location.split(',');
                        setTempMarker({ lat: parseFloat(latStr), lng: parseFloat(lngStr), name: s.name });
                        if (!newItem.name) setNewItem(prev => ({...prev, name: s.name}));
                        showMsg("已找到地點！");
                    } else showMsg("找不到地點");
                } catch(e) { showMsg("搜尋出錯"); }
            };

            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                const lat = tempMarker ? tempMarker.lat : 22.54; const lng = tempMarker ? tempMarker.lng : 114.11;
                const newP = { id: 'p' + Date.now(), ...newItem, lat, lng, travelMode: 'drive' };
                const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: [...d.places, newP] } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                const targetName = newItem.name;
                const lat = tempMarker ? tempMarker.lat : null;
                const lng = tempMarker ? tempMarker.lng : null;

                    ...d,
                    places: d.places.map(p => {
                        if (p.id === newItem.id) return { ...p, ...newItem, ...(lat ? { lat, lng } : {}) };
                        if (p.name === targetName) return { ...p, address: newItem.address || p.address, ...(lat ? { lat, lng } : {}) };
                        return p;
                    })

                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            return (
                <div className="flex flex-col h-full bg-slate-900">
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full border border-slate-700 shadow-2xl font-bold tracking-wide"><span>{toast}</span></div></div>}
                    {previewImage && <div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4 animate-fade-in" onClick={() => setPreviewImage(null)}><button className="absolute top-4 right-4 p-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-colors shadow-lg"><Icons.X size={24} /></button><img src={previewImage} className="max-w-full max-h-full object-contain" /></div>}
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">

                            <div className="flex flex-col min-w-0 flex-1">
                                <input value={trip.title} onChange={(e) => pushUpdate({trip:{...trip, title:e.target.value}})} className="text-sm font-bold bg-transparent outline-none w-full" />

                                                                        <div className="w-[60px] h-[60px] bg-slate-700 rounded-lg shrink-0 overflow-hidden cursor-pointer" onClick={() => p.image && setPreviewImage(p.image)}>{p.image ? (<img src={p.image} className="w-full h-full object-cover" />) : (<div className="w-full h-full flex items-center justify-center"><CategoryIcon type={p.type} size={24} /></div>)}</div>
                                                                        <div className="flex-1 min-w-0">

                    {showDeleteDayConfirm && (<div className="fixed inset-0 bg-black/80 z-[120] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl p-6 text-center border border-slate-700 max-w-sm w-full"><h3 className="font-bold text-lg text-slate-100">確定刪除此日？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2 border rounded-xl border-slate-600 text-slate-300">取消</button><button onClick={() => { pushUpdate({trip:{...trip, days: trip.days.filter(d => d.id !== activeDayId)}}); if(trip.days.length > 1) setActiveDayId(trip.days.find(d=>d.id!==activeDayId).id); setShowDeleteDayConfirm(false); }} className="flex-1 py-2 bg-red-600 text-white rounded-xl">刪除</button></div></div></div>)}

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const [toast, setToast] = useState(null);
            const appId = 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            useEffect(() => { window.FirebaseSDK.signInAnonymously(auth); return window.FirebaseSDK.onAuthStateChanged(auth, setUser); }, [auth]);
            useEffect(() => { if (!user) return; const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips'); return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => { const fetchedTrips = []; snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); }); setTrips(fetchedTrips); }); }, [user, db, appId]);
            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={async () => { const nid = 'trip_' + Date.now(); await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', nid), { trip: { id: nid, title: '新行程', dates: getFutureDate(0), icon: '🚀', days: [{id: 1, title: 'Day 1', date: getFutureDate(0), places: []}] }, members: [{ id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' }], expenses: [], shoppingItems: [], packingList: [] }); setActiveTripId(nid); setCurrentView('planner'); }} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={async (id) => { if (confirm("確定刪除？")) await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', id)); }} onImportTrip={() => {}} onExportTrip={() => {}} toast={toast} />;
            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
