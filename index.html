        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const gcj02towgs84 = (lng, lat) => {
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };
            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };
            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [lng * 2 - mglng, lat * 2 - mglat];
        };

        const wgs84togcj02 = (lng, lat) => {
            if (lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271) return [lng, lat];
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };
            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };
            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [mglng, mglat];
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const decoratorLayersRef = useRef({});
            const mapDataHashRef = useRef('');
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '&copy; 高德地圖'
                }).addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                if (tempMarkerRef.current) { map.removeLayer(tempMarkerRef.current); tempMarkerRef.current = null; }
                if (tempMarker) {
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-xl bg-red-500 animate-bounce" style="z-index: 2000;">📍</div>`;
                    const [gLng, gLat] = wgs84togcj02(tempMarker.lng, tempMarker.lat);
                    const marker = L.marker([gLat, gLng], { icon: L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32] }) }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map);
                    marker.openPopup();
                    map.setView([gLat, gLng], 15, { animate: true });
                    tempMarkerRef.current = marker;
                }
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => {
                         const [gLng, gLat] = wgs84togcj02(p.lng, p.lat);
                         return [gLat, gLng];
                     }));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6';
                const validPlaces = places.filter(p => p.lat && p.lng);
                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode || 'drive'}-${p.routeIndex || 0}`)) + markerColor + routeColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => { if (map.hasLayer(markersRef.current[id].marker)) map.removeLayer(markersRef.current[id].marker); delete markersRef.current[id]; });
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline) map.removeLayer(layers.outline);
                    if (layers.main) map.removeLayer(layers.main);
                    if (decoratorLayersRef.current[key]) map.removeLayer(decoratorLayersRef.current[key]);
                    delete routeLayersRef.current[key];
                    delete decoratorLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    const posCounter = {};
                    const offsetDist = 0.00020; // 約 20 公尺的經緯度偏移量

                    validPlaces.forEach((place, index) => {
                        let [gLng, gLat] = wgs84togcj02(place.lng, place.lat);
                        const posKey = `${gLng.toFixed(5)},${gLat.toFixed(5)}`;
                        if (!posCounter[posKey]) {
                            posCounter[posKey] = 1;
                        } else {
                            const count = posCounter[posKey]++;
                            const angle = (count * (Math.PI * 2)) / 6;
                            gLng += Math.cos(angle) * offsetDist;
                            gLat += Math.sin(angle) * offsetDist;
                        }

                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor};">${index + 1}</div>`;
                        const marker = L.marker([gLat, gLng], { 
                            icon: L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32] }),
                            zIndexOffset: 100 
                        }).bindPopup(`<b>${place.name}</b>`).addTo(map);
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i]; const p2 = validPlaces[i + 1];
                                const travelMode = p1.travelMode || 'drive';
                                const segmentKey = `${p1.id}-${p2.id}`;
                                const profile = travelMode === 'walk' ? 'foot' : 'driving';
                                const url = `https://router.project-osrm.org/route/v1/${profile}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson`;
                                
                                let geo;
                                try {
                                    const res = await fetch(url);
                                    const data = await res.json();
                                    geo = (data.code === 'Ok' && data.routes?.length > 0) ? data.routes[0].geometry : { type: 'LineString', coordinates: [[p1.lng, p1.lat], [p2.lng, p2.lat]] };
                                } catch(e) { geo = { type: 'LineString', coordinates: [[p1.lng, p1.lat], [p2.lng, p2.lat]] }; }

                                const geoGCJ = JSON.parse(JSON.stringify(geo));
                                geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                
                                const outline = L.geoJSON(geoGCJ, { style: outlineStyle }).addTo(map);
                                const main = L.geoJSON(geoGCJ, { style: mainStyle }).addTo(map);
                                
                                const arrowDecorator = L.polylineDecorator(main, {
                                    patterns: [{ offset: '5%', repeat: '60px', symbol: L.Symbol.arrowHead({ pixelSize: 10, polygon: false, pathOptions: { color: '#FFFFFF', weight: 3, opacity: 0.9 } }) }]
                                }).addTo(map);

                                if (main.bringToFront) main.bringToFront();
                                routeLayersRef.current[segmentKey] = { outline, main, baseColor: routeColor };
                                decoratorLayersRef.current[segmentKey] = arrowDecorator;
                                await new Promise(r => setTimeout(r, 20));
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            useEffect(() => {
                Object.entries(markersRef.current).forEach(([placeId, data]) => {
                    const { marker, index, baseColor } = data;
                    const isHovered = hoveredId === placeId;
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${baseColor}; ${isHovered ? 'transform: scale(1.4); background-color: #f59e0b; border-color: #fff;' : ''}">${index + 1}</div>`;
                    marker.setIcon(L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32] }));
                    if (isHovered) {
                        marker.setZIndexOffset(2000); // 確保在最頂端
                        if (!marker.getPopup().isOpen()) marker.openPopup();
                    } else {
                        marker.setZIndexOffset(100);
                        marker.closePopup();
                    }
                });
            }, [hoveredId]);

            useEffect(() => {
                Object.values(routeLayersRef.current).forEach(data => {
                    if (hoveredSegmentId && data.main) {
                        data.main.setStyle({ color: '#f59e0b', weight: 10 });
                    } else {
                        data.main.setStyle({ color: data.baseColor, weight: 8 });
                    }
                });
            }, [hoveredSegmentId]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

                        if (data.trip) setTrip(data.trip);
                        if (data.members) setMembers(data.members);
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.shoppingItems) setShoppingItems(data.shoppingItems);
                        if (data.packingList) setPackingList(data.packingList);
                        if (!activeDayId && data.trip?.days?.length > 0) setActiveDayId(data.trip.days[0].id);
                    }
                });
            }, [user, tripId]);

            const pushUpdate = (data) => window.FirebaseSDK.updateDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId), data);
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            const activeDayData = useMemo(() => trip.days?.find(d => d.id === activeDayId) || trip.days?.[0], [trip, activeDayId]);
            const getMemberInfo = useCallback((name) => members.find(m => m.name === name) || { color: 'bg-gray-400', avatar: '👤' }, [members]);

            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                const lat = tempMarker ? tempMarker.lat : 22.5 + Math.random()*0.1;
                const lng = tempMarker ? tempMarker.lng : 114.1 + Math.random()*0.1;
                const targetName = newItem.name;
                const newP = { id: 'p' + Date.now(), ...newItem, lat, lng, travelMode: 'drive', routeIndex: 0 };
                const newDays = trip.days.map(d => ({
                    ...d,
                    places: d.places.map(p => (p.name === targetName ? { ...p, address: newItem.address || p.address, lat, lng } : p))
                }));
                const dayIndex = newDays.findIndex(d => d.id === activeDayId);
                if (dayIndex !== -1) newDays[dayIndex].places.push(newP);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                const targetName = newItem.name;
                const lat = tempMarker ? tempMarker.lat : null;
                const lng = tempMarker ? tempMarker.lng : null;
                const newDays = trip.days.map(d => ({
                    ...d,
                    places: d.places.map(p => {
                        if (p.id === newItem.id) {
                            return { ...p, name: newItem.name, note: newItem.note, type: newItem.type, time: newItem.time, stayTime: newItem.stayTime || '1', address: newItem.address || p.address, ...(lat ? { lat, lng } : {}) };
                        } else if (p.name === targetName) {
                            return { ...p, address: newItem.address || p.address, ...(lat ? { lat, lng } : {}) };
                        }
                        return p;
                    })
                }));
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            const handleAddressInput = (e) => {
                const val = e.target.value; setNewItem(p => ({...p, address: val}));
                if (!val.trim()) { setAddressSuggestions([]); return; }
                const timer = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(val)}&offset=5&page=1&key=${AMAP_KEY}`);
                        const data = await res.json();
                        if (data.status === '1' && data.pois) setAddressSuggestions(data.pois);
                    } catch(e) {}
                }, 800);
                return () => clearTimeout(timer);
            };

            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 font-sans relative">
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full border border-slate-700 shadow-2xl font-bold tracking-wide"><span>{toast}</span></div></div>}
                    {previewImage && <div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4 animate-fade-in" onClick={() => setPreviewImage(null)}><button className="absolute top-4 right-4 p-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-colors shadow-lg"><Icons.X size={24} /></button><img src={previewImage} className="max-w-full max-h-full object-contain" /></div>}
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">
                        <div className="flex items-center gap-3 flex-1">
                            <button onClick={onBack} className="p-1.5 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300"><Icons.ArrowLeft size={20} /></button>
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold hover:scale-105 transition-transform"><input value={trip.icon || '🚀'} onChange={e => pushUpdate({trip:{...trip, icon:e.target.value}})} className="w-full h-full bg-transparent text-center text-lg outline-none cursor-pointer" maxLength="2"/></div>
                            <div className="flex flex-col min-w-0 flex-1"><input value={trip.title} onChange={(e) => pushUpdate({trip:{...trip, title:e.target.value}})} className="text-sm font-bold bg-transparent outline-none w-full" /><input value={trip.dates} onChange={(e) => pushUpdate({trip:{...trip, dates:e.target.value}})} className="text-xs text-slate-500 bg-transparent outline-none w-full" /></div>
                        </div>
                        <OnlineUserBadge />
                    </header>
                    <div className="flex border-b border-slate-800 bg-slate-900 px-4 gap-6 text-sm font-medium overflow-x-auto no-scrollbar">
                        <button onClick={() => setActiveTab('itinerary')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'itinerary' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Map size={18} />行程</button>
                        <button onClick={() => setActiveTab('expenses')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'expenses' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Wallet size={18} />花費</button>
                    </div>
                    <div className="flex flex-1 overflow-hidden">
                        {activeTab === 'itinerary' && (
                            <>
                                <div className="w-full md:w-[450px] flex flex-col border-r border-slate-800 bg-slate-900 shrink-0 relative z-10 shadow-2xl h-full transition-all">
                                    {panelMode === 'list' ? (
                                        <>
                                            <div ref={daysContainerRef} onMouseDown={(e) => { isDraggingDay.current = true; dragStartX.current = e.pageX; dragScrollLeft.current = daysContainerRef.current.scrollLeft; dragHasMoved.current = false; }} onMouseLeave={() => { isDraggingDay.current = false; }} onMouseUp={() => { isDraggingDay.current = false; }} onMouseMove={(e) => { if(!isDraggingDay.current) return; const walk = (e.pageX - dragStartX.current); if (Math.abs(walk) > 5) { dragHasMoved.current = true; daysContainerRef.current.scrollLeft = dragScrollLeft.current - walk; } }} className="bg-slate-900 border-b border-slate-800 px-3 py-4 flex flex-nowrap gap-3 overflow-x-auto no-scrollbar shadow-sm cursor-grab active:cursor-grabbing select-none">
                                                {trip.days?.map((day, idx) => (<button key={day.id} onClick={() => { if(!dragHasMoved.current) setActiveDayId(day.id); }} className={`flex flex-col items-start min-w-[100px] shrink-0 p-3 rounded-xl border ${activeDayId === day.id ? 'bg-blue-900/40 border-blue-500 ring-1 ring-blue-500 shadow-md' : 'bg-slate-800 border-slate-700'}`}><div className="flex justify-between w-full mb-1.5 pointer-events-none"><span className={`text-sm font-bold ${activeDayId === day.id ? 'text-blue-400' : 'text-slate-400'}`}>Day {idx + 1}</span></div><span className="text-xs font-medium mb-1 text-slate-500 pointer-events-none">{formatShortDate(day.date)}</span></button>))}
                                            </div>
                                            <div className="px-4 py-4 overflow-y-auto flex-1 pb-32">
                                                {activeDayData?.places.map((p, i) => (
                                                    <div key={p.id} onMouseEnter={() => setHoveredPlaceId(p.id)} onMouseLeave={() => setHoveredPlaceId(null)} className="flex flex-col">
                                                        <div className="flex gap-3 items-stretch">
                                                            <div className="flex flex-col items-center w-12 shrink-0">
                                                                <div className="text-[12px] font-bold text-blue-300 font-mono mb-1.5 pt-1">{p.time}</div>
                                                                <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold text-white mt-1 shadow-lg shadow-blue-900/50 border-2 border-slate-900">{i+1}</div>
                                                                {i < activeDayData.places.length - 1 && <div className="w-0.5 bg-slate-700 flex-1 mt-1.5 min-h-[1.5rem]"></div>}
                                                            </div>
                                                            <div className="flex-1 pb-3">
                                                                <div className={`flex items-start gap-3 p-3 rounded-xl border border-slate-700 bg-slate-800/80 transition-all ${hoveredPlaceId === p.id ? 'border-blue-500 bg-slate-700/50' : ''}`}>
                                                                    <div className="w-[60px] h-[60px] bg-slate-700 rounded-lg shrink-0 flex items-center justify-center relative overflow-hidden cursor-pointer" onClick={() => p.image && setPreviewImage(p.image)}>{p.image ? (<img src={p.image} className="w-full h-full object-cover" />) : (<CategoryIcon type={p.type} size={24} />)}</div>
                                                                    <div className="flex-1 min-w-0">
                                                                        <div className="flex justify-between items-start">
                                                                            <h3 className="font-bold text-slate-100 leading-snug line-clamp-2">{p.name}</h3>
                                                                            <button onClick={() => { setNewItem({ ...p }); setPanelMode('edit'); }} className="p-1.5 text-slate-400 hover:text-white"><Icons.MoreVertical size={18} /></button>
                                                                        </div>
                                                                        <div className="text-[11px] text-slate-400 mt-1.5">停留 {p.stayTime} 小時</div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        {i < activeDayData.places.length - 1 && (
                                                            <div className="flex items-stretch gap-3">
                                                                <div className="flex flex-col items-center w-12 shrink-0"><div className="w-2.5 h-2.5 rounded-full bg-amber-500/50 border border-amber-500 z-10"></div><div className="border-l-2 border-dashed border-slate-600 flex-1 mt-1.5 min-h-[2rem]"></div></div>
                                                                <div className="flex-1 pb-4 flex items-start -mt-3"><TravelSegmentUI p1={p} p2={activeDayData.places[i+1]} onUpdateMode={()=>{}} onMouseEnter={() => setHoveredSegmentId(`${p.id}-${activeDayData.places[i+1].id}`)} onMouseLeave={() => setHoveredSegmentId(null)} /></div>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                                <button onClick={() => { setPanelMode('add'); setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' }); }} className="w-full py-3.5 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 font-bold hover:border-blue-500 hover:text-blue-400 transition-all mt-4">+ 新增行程景點</button>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex flex-col h-full bg-slate-900">
                                            <div className="flex items-center bg-slate-900/80 border-b border-slate-700 p-2"><button onClick={() => setPanelMode('list')} className="p-2 text-slate-400"><Icons.ArrowLeft size={20} /></button><div className="flex-1 text-center font-bold">{panelMode === 'add' ? '新增景點' : '編輯景點'}</div></div>
                                            <div className="p-4 overflow-y-auto flex-1">
                                                <form onSubmit={panelMode === 'add' ? handleManualAddSubmit : handleEditSubmit} className="space-y-4">
                                                    <div><label className="block text-xs font-bold text-slate-400 mb-1">景點名稱</label><input required value={newItem.name} onChange={e => setNewItem({...newItem, name:e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none" /></div>
                                                    <div><label className="block text-xs font-bold text-slate-400 mb-1">地址搜尋</label><div className="flex gap-2"><input value={newItem.address} onChange={handleAddressInput} className="flex-1 px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none" /><button type="button" onClick={() => handleAddressSearch()} className="bg-blue-600 p-2.5 rounded-lg"><Icons.Search size={18} /></button></div>
                                                        {addressSuggestions.length > 0 && (<div className="mt-1 bg-slate-800 rounded-xl border border-slate-600 divide-y divide-slate-700">{addressSuggestions.map((s, idx) => (<div key={idx} onClick={() => handleSuggestionClick(s)} className="p-3 hover:bg-slate-700 cursor-pointer"><div className="text-sm font-bold">{s.name}</div><div className="text-[10px] text-slate-400">{s.address}</div></div>))}</div>)}
                                                    </div>
                                                    <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-4 shadow-lg">{panelMode === 'add' ? '完成新增' : '儲存修改'}</button>
                                                </form>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 relative hidden md:block"><RealMap places={activeDayData?.places || []} hoveredId={hoveredPlaceId} hoveredSegmentId={hoveredSegmentId} zoomControlKey={activeDayId} dayColor={activeDayData?.color} onRouteAltSelect={()=>{}} tempMarker={tempMarker} /></div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const appId = 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            useEffect(() => { window.FirebaseSDK.signInAnonymously(auth); return window.FirebaseSDK.onAuthStateChanged(auth, setUser); }, [auth]);
            useEffect(() => { if (!user) return; const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips'); return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => { const fetchedTrips = []; snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); }); if (snapshot.empty) { window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', 'trip_sz-macau'), INITIAL_TRIP_DATA); } setTrips(fetchedTrips); }); }, [user, db, appId]);
            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={()=>{}} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={()=>{}} onImportTrip={()=>{}} onExportTrip={()=>{}} toast={null} />;
            return <TripPlannerPage tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
