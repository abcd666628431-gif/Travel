        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const MM = date.getMonth() + 1;
            const DD = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${MM}/${DD} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        
        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const R = 6371; 
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin), dist };
        };

        const getEndTime = (timeStr, hoursToAdd = 1) => {
            if (!timeStr) return '';
            let [h, m] = timeStr.split(':').map(Number);
            const totalMinutes = Math.round(parseFloat(hoursToAdd || 1) * 60);
            m += totalMinutes;
            h = (h + Math.floor(m / 60)) % 24;
            m = m % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        };

            Settings: (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,

                default: return <div className={`${baseClass} bg-gray-400`} style={style}><Icon size={size} path={<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>} /></div>;

        const RealMap = React.memo(({ places, hoveredId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => map.invalidateSize(), 200);
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current; if (!map) return;
                if (tempMarkerRef.current) { map.removeLayer(tempMarkerRef.current); tempMarkerRef.current = null; }
                if (tempMarker) {
                    const icon = L.divIcon({ className: 'leaflet-div-icon', html: `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-xl text-white font-bold text-xl bg-red-500 animate-bounce">📍</div>`, iconSize: [32, 32], iconAnchor: [16, 32] });
                    tempMarkerRef.current = L.marker([tempMarker.lat, tempMarker.lng], { icon }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map).openPopup();
                    map.setView([tempMarker.lat, tempMarker.lng], 15, { animate: true });
                }
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current; if (!map) return;
                const vps = places.filter(p => p.lat && p.lng);
                if (vps.length > 0) {
                    const bounds = L.latLngBounds(vps.map(p => [p.lat, p.lng]));
                    if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey, places]);

            useEffect(() => {
                const map = mapInstanceRef.current; if (!map) return;
                let isMounted = true;
                const color = dayColor || '#3b82f6';
                const valid = places.filter(p => p.lat && p.lng);

                Object.keys(markersRef.current).forEach(id => { map.removeLayer(markersRef.current[id].marker); delete markersRef.current[id]; });
                Object.keys(routeLayersRef.current).forEach(key => { const l = routeLayersRef.current[key]; if (l.outline) map.removeLayer(l.outline); if (l.main) map.removeLayer(l.main); if (l.alts) l.alts.forEach(a => map.removeLayer(a)); delete routeLayersRef.current[key]; });

                valid.forEach((p, index) => {
                    const isHov = hoveredId === p.id;
                    const html = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-lg text-white font-bold text-sm transition-all" style="background-color: ${color}; ${isHov ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                    const marker = L.marker([p.lat, p.lng], { icon: L.divIcon({ className: 'leaflet-div-icon', html, iconSize: [32, 32], iconAnchor: [16, 32] }) }).bindPopup(`<b>${p.name}</b>`).addTo(map);
                    if (isHov) marker.openPopup();
                    markersRef.current[p.id] = { marker };
                });

                if (valid.length > 1) {
                    (async () => {
                        for (let i = 0; i < valid.length - 1; i++) {
                            if (!isMounted) break;
                            const p1 = valid[i], p2 = valid[i+1];
                            const mode = p1.travelMode || 'drive';
                            const key = `${p1.id}-${p2.id}-${mode}`;
                            let geoData = window.routeCache?.[key];
                            if (!geoData) {
                                if (mode === 'straight') geoData = ['straight_line'];
                                else {
                                    const res = await fetch(`https://router.project-osrm.org/route/v1/${mode==='walk'?'foot':'driving'}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson&alternatives=true`);
                                    const d = await res.json();
                                    geoData = (d.code === 'Ok') ? d.routes.map(r => r.geometry) : ['straight_line'];
                                }
                                if (!window.routeCache) window.routeCache = {}; window.routeCache[key] = geoData;
                            }
                            if (!isMounted) return;
                            const geometries = Array.isArray(geoData) ? geoData : [geoData];
                            const idx = p1.routeIndex || 0;
                            const alts = geometries.map((geo, gIdx) => {
                                if (gIdx === idx || geo === 'straight_line') return null;
                                const l = L.geoJSON(geo, { style: { color: '#94a3b8', weight: 4, dashArray: '5, 10' } }).addTo(map);
                                const clickLayer = L.geoJSON(geo, { style: { color: 'transparent', weight: 20 } }).addTo(map);
                                clickLayer.on('click', () => onRouteAltSelect(p1.id, gIdx));
                                return l;
                            }).filter(Boolean);
                            const mainGeo = geometries[idx];
                            const main = mainGeo === 'straight_line' ? L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], { color: '#3b82f6', weight: 8 }).addTo(map) : L.geoJSON(mainGeo, { style: { color: '#3b82f6', weight: 8 } }).addTo(map);
                            routeLayersRef.current[key] = { main, alts };
                            await new Promise(r => setTimeout(r, 20));
                        }
                    })();
                }
                return () => { isMounted = false; };
            }, [places, dayColor]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

            const [isSearchingAddress, setIsSearchingAddress] = useState(false);
            const [hoveredPlaceId, setHoveredPlaceId] = useState(null);
            const [dragEnabledId, setDragEnabledId] = useState(null);
            const [draggedPlaceIndex, setDraggedPlaceIndex] = useState(null);
            const [expandedNotes, setExpandedNotes] = useState({});
            const [placeToDelete, setPlaceToDelete] = useState(null);
            const [displayCurrency, setDisplayCurrency] = useState('HKD');
            const [expenseFilter, setExpenseFilter] = useState('all');
            const [packingFilter, setPackingFilter] = useState('all');
            const [addModalTab, setAddModalTab] = useState('custom');
            const [newPackingItem, setNewPackingItem] = useState({ text: '', owner: '' });
            const [newExpenseItem, setNewExpenseItem] = useState({ date: '2026-04-03', title: '', category: 'food', payer: '', amount: '', currency: 'JPY', sharedBy: [], image: null });
            const [newShoppingItem, setNewShoppingItem] = useState({ name: '', qty: 1, price: 0, currency: 'MOP', requester: '', note: '', image: null });
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showShoppingModal, setShowShoppingModal] = useState(false);
            const [showPackingModal, setShowPackingModal] = useState(false);
            const [showSettlementPlan, setShowSettlementPlan] = useState(false); 
            const [showMemberSettings, setShowMemberSettings] = useState(false);
            const [showDeleteDayConfirm, setShowDeleteDayConfirm] = useState(false);
            
            const searchTimeoutRef = useRef(null);
            const daysContainerRef = useRef(null);

            useEffect(() => { stateRef.current = { trip, activeDayId, hoveredPlaceId, panelMode, newItem }; }, [trip, activeDayId, hoveredPlaceId, panelMode, newItem]);

                    </div>

                    {showDeleteDayConfirm && (<div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此日？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2 border rounded-xl border-slate-600 text-slate-300">取消</button><button onClick={() => { pushUpdate({trip:{...trip, days: trip.days.filter(d => d.id !== activeDayId)}}); if(trip.days.length > 1) setActiveDayId(trip.days.find(d=>d.id!==activeDayId).id); setShowDeleteDayConfirm(false); }} className="flex-1 py-2 bg-red-600 text-white rounded-xl">刪除</button></div></div></div>)}
                    {placeToDelete && (<div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此景點？</h3><div className="flex gap-3 mt-6"><button onClick={() => setPlaceToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 text-slate-300 font-bold">取消</button><button onClick={confirmDeletePlace} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold shadow-lg">刪除</button></div></div></div>)}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const [toast, setToast] = useState(null);
            const appId = 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            
            useEffect(() => {
                const initAuth = async () => { try { await window.FirebaseSDK.signInAnonymously(auth); } catch (e) {} };
                initAuth();
                return window.FirebaseSDK.onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user) return;
                return window.FirebaseSDK.onSnapshot(window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips'), (snapshot) => {
                    const fetched = []; snapshot.forEach(doc => { fetched.push({ id: doc.id, ...doc.data() }); });
                    if (snapshot.empty) window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', 'trip_init'), INITIAL_TRIP_DATA);
                    setTrips(fetched.sort((a, b) => b.id.localeCompare(a.id)));
                });
            }, [user, db]);

            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={async () => {
                const nid = 'trip_' + Date.now();
                await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', nid), { 
                    trip: { id: nid, title: '新行程', dates: getFutureDate(0), icon: '✈️', days: [{id: 1, title: 'Day 1', date: getFutureDate(0), places: [], weather: { type: 'sun' }}] }, 
                    members: [{ id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' }], 
                    expenses: [], shoppingItems: [], packingList: [] 
                });
                setActiveTripId(nid); setCurrentView('planner');
            }} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={async (id) => { if (confirm("確定刪除？")) await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', id)); }} toast={toast} />;
            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
