    <style>

    <script type="importmap">
    {

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback, memo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, initializeFirestore, persistentLocalCache, memoryLocalCache, collection, doc, setDoc, onSnapshot, query, deleteDoc, serverTimestamp, writeBatch } from 'firebase/firestore';
        import { Map as MapIcon, Plus, Minus, Maximize, Shield, Skull, MessageSquare, Navigation, Upload, RefreshCw, Eye, EyeOff, Settings, Filter, Trash2, Edit2, ChevronLeft, MapPin, Menu, Crosshair, Grid, Image as ImageIcon, X, Download, FileUp, Database, AlertTriangle, ExternalLink, Radio, Layers, Search, Wifi, WifiOff, Loader2, Check, Camera, ZoomIn, Target, History, GripVertical, ChevronDown, ChevronRight as ChevronRightIcon, RefreshCcw, RotateCcw, Bell, Volume2, VolumeX, User, Music, Monitor, Zap, Tag, Copy, Lock, Unlock, Users, Star } from 'lucide-react';

        // --- Config ---
        let firebaseConfig = null; 
        let appId = 'icarus-3a27d'; 
        let app, auth, db; 
        let isConfigured = false;

        if (typeof window.__firebase_config !== 'undefined') { 
            try { 
                firebaseConfig = JSON.parse(window.__firebase_config); 
                if (typeof window.__app_id !== 'undefined') appId = window.__app_id; 
                isConfigured = true; 
            } catch (e) {} 
        }

        const manualConfig = { 
            apiKey: "AIzaSyBE_zihRCqVCXks-v_rRKmVYlx7hKkVY9I",
            authDomain: "icarus-3a27d.firebaseapp.com",
            projectId: "icarus-3a27d",
            storageBucket: "icarus-3a27d.firebasestorage.app",
            messagingSenderId: "590060338271",
            appId: "1:590060338271:web:de1dd106310de80741afea"
        };

        if (!isConfigured && manualConfig.apiKey) { 
            firebaseConfig = manualConfig; 
            isConfigured = true; 
        }

        if (isConfigured) { 
            try { 
                app = initializeApp(firebaseConfig); 
                auth = getAuth(app); 
                try {
                    db = initializeFirestore(app, { localCache: persistentLocalCache() });
                } catch (e) {
                    console.warn("持久化快取衝突，自動退回記憶體快取模式", e);
                    db = initializeFirestore(app, { localCache: memoryLocalCache() });
                }
            } catch(e) { 
                console.error("Firebase init failed", e); 
                isConfigured = false; 
            } 
        }

        const LocalDB = {
            prefix: 'tactical_ops_v2_',
            getData: (c) => { 
                try { 
                    const res = JSON.parse(localStorage.getItem(LocalDB.prefix + c) || '[]'); 
                    return Array.isArray(res) ? res : []; 
                } catch { return []; } 
            },
            saveData: (c, d) => { 
                localStorage.setItem(LocalDB.prefix + c, JSON.stringify(d)); 
                window.dispatchEvent(new CustomEvent('ldb-upd', { detail: { c } })); 
            },
            setDoc: async (c, id, d) => { 
                const items = LocalDB.getData(c); 
                const idx = items.findIndex(i => i.id === id); 
                const nd = { ...d, id, _upd: Date.now() }; 
                if (idx >= 0) items[idx] = { ...items[idx], ...nd }; 
                else items.push(nd); 
                LocalDB.saveData(c, items); 
            },
            deleteDoc: async (c, id) => { 
                const items = LocalDB.getData(c); 
                LocalDB.saveData(c, items.filter(i => i.id !== id)); 
            },
            subscribe: (c, cb) => { 
                const h = (e) => { if (!e.detail || e.detail.c === c) cb(LocalDB.getData(c)); }; 
                window.addEventListener('ldb-upd', h); 
                cb(LocalDB.getData(c)); 
                return () => window.removeEventListener('ldb-upd', h); 
            }
        };

        const MAP_SIZE = 2000; 
        const BORDER_WIDTH = 2;
        const DEFAULT_GROUPS = [ 
            { id: 'danger', label: '危險', color: '#ef4444', order: 0 }, 
            { id: 'loot', label: '資源', color: '#facc15', order: 1 }, 
            { id: 'loot_gold', label: '黃金', color: '#fbbf24', parentId: 'loot', order: 0 }, 
            { id: 'loot_iron', label: '鋼鐵', color: '#94a3b8', parentId: 'loot', order: 1 }, 
            { id: 'loot_oil', label: '石油', color: '#0f172a', parentId: 'loot', order: 2 }, 
            { id: 'base', label: '據點', color: '#22c55e', order: 2 }, 
            { id: 'info', label: '情報', color: '#60a5fa', order: 3 } 
        ];
        const DEFAULT_STATUSES = [ 
            { id: 'not_started', label: '未開採', color: '#64748b', isDefault: true }, 
            { id: 'in_progress', label: '進行中', color: '#3b82f6', isDefault: false }, 
            { id: 'completed', label: '已開採', color: '#10b981', isDefault: false } 
        ];

        const generateGridIds = () => { 
            const l = 'ABCDEFGHIJKLMNOP'.split(''); 
            const ids = []; 
            for(let r=1;r<=16;r++) for(let i=0;i<16;i++) ids.push(`${l[i]}${r}`); 
            return ids; 
        };
        const gridIds = generateGridIds();

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("App Crash:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-[#050a14] text-red-500 p-8 text-center">
                            <AlertTriangle size={64} className="mb-4" />
                            <h2 className="text-2xl font-bold mb-2">系統發生嚴重錯誤</h2>
                            <p className="text-slate-400 mb-6">可能因為資料結構損毀或無限迴圈導致。</p>
                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="px-6 py-3 bg-red-900/50 border border-red-700 rounded text-white hover:bg-red-800 transition flex items-center"><RefreshCcw className="mr-2" size={16}/> 重置所有本地數據並重載</button>
                        </div>
                    );
                }
                return this.props.children;
             }
        }

        const MapGridCell = memo(({ id, segment, interactionMode, onClick }) => {
            const unlocked = segment?.status === 'unlocked';
            const displayUrl = !unlocked ? null : segment.imageUrl;
            return (
                <div onClick={(e) => onClick(e, id)} className={`relative transition-all duration-300 group ${unlocked?'bg-slate-900':'bg-black'} ${interactionMode==='map_edit'?'border border-slate-600 hover:border-blue-500 hover:bg-slate-800/50 cursor-pointer z-50':'border border-white/15'}`}>
                    {unlocked && (displayUrl ? <img src={displayUrl} className="w-full h-full object-cover opacity-90 pointer-events-none select-none z-0 relative" onError={e=>e.target.style.display='none'} loading="lazy" decoding="async"/> : <div className="w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/diagmonds-light.png')] pointer-events-none select-none z-0 relative"></div>)}
                    <span className={`absolute top-1 left-1 text-xs font-mono font-bold pointer-events-none select-none z-1 drop-shadow-md ${interactionMode==='map_edit'?'text-blue-500':'text-white/70'}`}>{id}</span>
                    {interactionMode==='map_edit' && !unlocked && <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-20"><Plus className="text-blue-500" size={24}/></div>}
                </div>
            );
        }, (prev, next) => prev.id === next.id && prev.segment === next.segment && prev.interactionMode === next.interactionMode);

        const MapMarker = memo(({ marker, scale, isDragging, onClick, renderIcon, getGroup, getStatus, markerClass }) => {
            const status = getStatus(marker.status);
            const statusStyle = status ? {boxShadow: `0 0 0 2px ${status.color}, 0 0 10px ${status.color}80`} : {};
            return (
                <div className={`absolute z-[60] hover:z-[100] group cursor-pointer ${isDragging ? 'pointer-events-none' : ''}`} style={{left:`${marker.x}%`, top:`${marker.y}%`, transform:`translate(-50%,-50%) scale(${1/scale})`}} onClick={e=>onClick(e, marker)}>
                    <div className={`relative ${markerClass} transition-transform duration-200 hover:scale-125 rounded-full`} style={statusStyle}>
                        {renderIcon(marker.type, marker.size)}
                        {!isDragging && <div className="absolute left-1/2 bottom-full mb-3 -translate-x-1/2 w-max max-w-[250px] bg-slate-900/95 text-xs p-2 rounded border border-slate-600 text-white opacity-0 group-hover:opacity-100 pointer-events-none z-50 text-center transition-opacity shadow-xl font-sans whitespace-pre-wrap break-words">
                            {status && <div className="mb-1 text-[10px] uppercase tracking-wider font-bold" style={{color: status.color}}>{status.label}</div>}
                            {marker.note||getGroup(marker.type).label}
                        </div>}
                    </div>
                </div>
            );
        }, (prev, next) => prev.marker === next.marker && prev.scale === next.scale && prev.isDragging === next.isDragging);

        function LoadingScreen({ onForceOffline, errorMsg }) {
             return (
                <div className="flex flex-col items-center justify-center h-screen bg-[#050a14] text-blue-500">
                    <Loader2 size={48} className="animate-spin mb-4" />
                    <div className="text-xs font-mono uppercase tracking-widest animate-pulse mb-6">正在連線至指揮中心...</div>
                    {errorMsg && <div className="bg-red-900/30 border border-red-800 text-red-200 p-4 rounded mb-4 max-w-md text-center text-sm"><p className="font-bold mb-1">連線失敗</p><p className="opacity-80">{errorMsg}</p></div>}
                    <button onClick={onForceOffline} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white text-xs rounded border border-slate-600 transition-colors">連線過久？切換至離線模式</button>
                </div>
            );
         }

        function WelcomeScreen({ onStartOffline }) {
            return (
                <div className="flex flex-col items-center justify-center h-screen bg-[#050a14] text-slate-200 p-6 relative overflow-hidden">
                    <div className="max-w-2xl w-full bg-slate-900 border border-slate-700 rounded-xl shadow-2xl p-8 z-10 relative">
                        <div className="flex items-center gap-4 mb-8 border-b border-slate-800 pb-6"><div className="p-3 bg-blue-600/20 rounded-lg border border-blue-500/50 text-blue-400"><MapIcon size={32} /></div><div><h1 className="text-2xl font-bold text-white tracking-wider">戰術地圖初始化</h1><p className="text-slate-500 text-sm">TACTICAL OPS SYSTEM V4.0.0</p></div></div>
                        <div className="grid md:grid-cols-2 gap-6 mb-8">
                            <button onClick={onStartOffline} className="flex flex-col items-start p-5 rounded-lg border border-slate-700 bg-slate-800 hover:bg-slate-750 transition-all group text-left"><div className="flex items-center gap-2 text-emerald-400 mb-2 font-bold group-hover:text-emerald-300"><WifiOff size={20} /> 單機離線模式</div><p className="text-xs text-slate-400 leading-relaxed">資料儲存於本機。<br/>無需設定，立即使用。</p><span className="mt-4 text-xs bg-emerald-900/30 text-emerald-400 px-2 py-1 rounded border border-emerald-800 group-hover:bg-emerald-600 group-hover:text-white transition-colors">啟動系統 &rarr;</span></button>
                            <div className="flex flex-col items-start p-5 rounded-lg border border-slate-700 bg-slate-950/50 opacity-70"><div className="flex items-center gap-2 text-blue-400 mb-2 font-bold"><Wifi size={20} /> 多人連線模式</div><p className="text-xs text-slate-500 leading-relaxed">需要 Firebase 設定。<br/><span className="text-yellow-600">未檢測到設定檔。</span></p><div className="mt-4 text-xs text-slate-600 flex items-center gap-1"><AlertTriangle size={10} /> 請編輯 HTML 檔案</div></div>
                        </div>
                        <div className="text-center border-t border-slate-800 pt-4"><p className="text-[10px] text-slate-600 font-mono">SYSTEM READY</p></div>
                    </div>
                </div>
            );
        }

        function NotificationToast({ notifications }) {
            return (
                <div className="absolute bottom-4 left-4 z-[60] flex flex-col-reverse gap-2 pointer-events-none">
                    {notifications.map(n => (
                        <div key={n.id} className="bg-slate-900/90 border-l-4 border-emerald-500 text-white p-3 rounded shadow-lg backdrop-blur animate-slideUp flex items-center min-w-[200px]">
                            <div className="mr-3 p-2 bg-emerald-500/20 rounded-full"><Bell size={16} className="text-emerald-400"/></div>
                            <div>
                                <div className="text-xs font-bold text-emerald-400 uppercase tracking-wider">{n.title}</div>
                                <div className="text-sm font-medium whitespace-pre-wrap">{n.message}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function TacticalMap() {
            const [mode, setMode] = useState(isConfigured ? 'online' : 'unconfigured');
            const [user, setUser] = useState(null);
            const [connectionError, setConnectionError] = useState(null);
            const [customName, setCustomName] = useState(() => { try { return localStorage.getItem('ops_username') || ''; } catch { return ''; } });
            const [nameInput, setNameInput] = useState(''); 
            const [isEditingName, setIsEditingName] = useState(false);
            useEffect(() => { try { if (customName) localStorage.setItem('ops_username', customName); } catch {} }, [customName]);
            const saveName = (val) => { const trimmed = val.trim(); if (trimmed && trimmed !== customName) setCustomName(trimmed); setIsEditingName(false); };
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [isEditMode, setIsEditMode] = useState(false);
            const [transportMode, setTransportMode] = useState('walk');
            const [maps, setMaps] = useState([]); 
            const [currentMapId, setCurrentMapId] = useState('default');
            const [markerStatuses, setMarkerStatuses] = useState(DEFAULT_STATUSES); 
            const [statusForm, setStatusForm] = useState({});
            const [isCreateMapModalOpen, setIsCreateMapModalOpen] = useState(false);
            const [newMapName, setNewMapName] = useState("");
            const [editingMapId, setEditingMapId] = useState(null);
            const [mapToDelete, setMapToDelete] = useState(null);
            const [mapToCopy, setMapToCopy] = useState(null);
            const [copyMapNameInput, setCopyMapNameInput] = useState("");
            const [activeUsersList, setActiveUsersList] = useState([]);
            const [lastUsedGroupId, setLastUsedGroupId] = useState('info');
            const [logPage, setLogPage] = useState(1);
            const LOGS_PER_PAGE = 10;
            const [scale, setScale] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const dragStartPosRef = useRef({ x: 0, y: 0 });
            const isMouseDownRef = useRef(false);
            const hasDraggedRef = useRef(false);
            const [markers, setMarkers] = useState([]);
            const [segments, setSegments] = useState({});
            const [markerGroups, setMarkerGroups] = useState([]);
            const [actionLogs, setActionLogs] = useState([]);
            const isGroupsLoaded = useRef(false);
            const [notifications, setNotifications] = useState([]);
            const prevMarkersRef = useRef(null);
            const [activeCell, setActiveCell] = useState(null);
            const [selectedMarker, setSelectedMarker] = useState(null);
            const [draftMarker, setDraftMarker] = useState(null); 
            const [interactionMode, setInteractionMode] = useState('tactical');
            const [isDeleteConfirming, setIsDeleteConfirming] = useState(false);
            const [tempNote, setTempNote] = useState("");
            const [tempImgUrl, setTempImgUrl] = useState("");
            const [tempMarkerImg, setTempMarkerImg] = useState("");
            const [tempSize, setTempSize] = useState(16);
            const [selectedGroupId, setSelectedGroupId] = useState('info');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [sidebarTab, setSidebarTab] = useState('filter');
            const [hiddenGroupIds, setHiddenGroupIds] = useState(new Set());
            const [hiddenNoteKeys, setHiddenNoteKeys] = useState(new Set());
            const [expandedGroupIds, setExpandedGroupIds] = useState(new Set());
            const [editingGroup, setEditingGroup] = useState(null);
            const [groupForm, setGroupForm] = useState({});
            const [isProcessingImage, setIsProcessingImage] = useState(false);
            const [isImporting, setIsImporting] = useState(false);
            const [countdown, setCountdown] = useState(60);
            const [draggedGroup, setDraggedGroup] = useState(null);
            const [lightboxImg, setLightboxImg] = useState(null);
            const fileInputRef = useRef(null);
            const containerRef = useRef(null);
            const mainRef = useRef(null);
            const panelClass = 'glass-panel';
            const markerClass = 'filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]';
            const getMapName = (id) => maps.find(m => m.id === id)?.name || '正在載入...';

            useEffect(() => {
                if (mode !== 'online' || !user) { setActiveUsersList([{ id: 'local', name: customName || '我 (離線)', isSelf: true }]); return; }
                let heartbeatInterval, unsubscribe;
                let isPresenceFeatureWorking = true;
                const sendHeartbeat = async () => {
                    if (!isPresenceFeatureWorking || !user) return;
                    try {
                        const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', 'presence', user.uid);
                        await setDoc(presenceRef, { user: customName || user.uid.slice(0, 4), lastSeen: serverTimestamp(), userAgent: navigator.userAgent }, { merge: true });
                    } catch (e) { if (e.code === 'permission-denied') { isPresenceFeatureWorking = false; if (heartbeatInterval) clearInterval(heartbeatInterval); } }
                };
                try {
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'presence'));
                    unsubscribe = onSnapshot(q, (snapshot) => {
                        const now = Date.now(); const active = [];
                        snapshot.forEach(doc => {
                            const data = doc.data(); let lastSeenTime = 0;
                            if (data.lastSeen) {
                                if (typeof data.lastSeen.toMillis === 'function') lastSeenTime = data.lastSeen.toMillis();
                                else if (data.lastSeen.seconds) lastSeenTime = data.lastSeen.seconds * 1000;
                                else lastSeenTime = data.lastSeen;
                            }
                            if (now - lastSeenTime < 120000) active.push({ id: doc.id, name: data.user || 'Unknown', isSelf: doc.id === user.uid });
                        });
                        active.sort((a, b) => (a.isSelf ? -1 : b.isSelf ? 1 : a.name.localeCompare(b.name)));
                        setActiveUsersList(active);
                    }, (error) => { isPresenceFeatureWorking = false; if (heartbeatInterval) clearInterval(heartbeatInterval); setActiveUsersList([{ id: user.uid, name: (customName || user.uid.slice(0,4)) + ' (連線中)', isSelf: true }]); });
                    sendHeartbeat(); heartbeatInterval = setInterval(sendHeartbeat, 60000);
                } catch (e) { console.error("Presence init failed", e); }
                return () => { if (heartbeatInterval) clearInterval(heartbeatInterval); if (typeof unsubscribe === 'function') unsubscribe(); };
            }, [mode, user, customName]);

            const isGroupVisible = (groupId, visited = new Set()) => {
                if (visited.has(groupId)) return true; visited.add(groupId);
                if (hiddenGroupIds.has(groupId)) return false;
                const group = markerGroups.find(g => g.id === groupId);
                if (group && group.parentId && group.parentId !== groupId) return isGroupVisible(group.parentId, visited);
                return true;
            };
            const isMarkerVisible = (m) => {
                 if (!isGroupVisible(m.type)) return false;
                 const k = `${m.type}::${m.note ? m.note.trim() : ''}`;
                 return !hiddenNoteKeys.has(k);
            };
            const currentMarkers = useMemo(() => markers.filter(m => (m.mapId === currentMapId) || (!m.mapId && currentMapId === 'default')), [markers, currentMapId]);

                                        const noteKey = `${group.id}::${noteText === '(無備註)' ? '' : noteText}`; const isSubVisible = !hiddenNoteKeys.has(noteKey) && isVisible;
                                        return (
                                            <div key={noteText} className={`flex items-center justify-between p-1.5 pl-3 rounded hover:bg-slate-800/50 cursor-pointer ${!isSubVisible ? 'opacity-50' : ''}`} onClick={()=>{ const k = new Set(hiddenNoteKeys); if(k.has(noteKey)) k.delete(noteKey); else k.add(noteKey); setHiddenNoteKeys(new Set(k)); }}>
                                                <span className="text-xs text-slate-400 truncate flex-1">{noteText} <span className="text-slate-600 ml-1">({noteGroups[noteText]})</span></span>
                                                <div>{!isSubVisible ? <EyeOff size={12}/> : <Eye size={12}/>}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    );
                });
            };
            const playNotificationSound = () => { try { const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.setValueAtTime(880, ctx.currentTime); gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.01); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2); osc.start(); osc.stop(ctx.currentTime + 0.2); } catch(e){} };

            if (mode === 'unconfigured') return <WelcomeScreen onStartOffline={() => setMode('offline')} />;
            if (mode === 'online' && !user) return <LoadingScreen errorMsg={connectionError} onForceOffline={() => setMode('offline')} />;

            return (
                <ErrorBoundary>
                    <header className={`flex-shrink-0 border-b border-slate-800 p-2 flex justify-between items-center z-20 shadow-lg ${panelClass}`}>
                        <div className="flex items-center space-x-3 ml-2"><MapIcon className="text-blue-500 text-xl" /><h1 className="text-xl font-bold tracking-wider text-white hidden md:block">多人協作戰術地圖</h1><span className="text-xs text-slate-500 ml-2 border-l border-slate-700 pl-3">v4.0.0</span></div>
                        <div className="flex-1 flex items-center justify-start overflow-x-auto no-scrollbar mx-4 px-2 space-x-1">
                            {maps.map(m => (
                                <div key={m.id} className={`group relative flex items-center px-3 py-1.5 rounded-t-lg cursor-pointer border-t border-x ${currentMapId === m.id ? 'bg-slate-900 border-slate-700 text-white z-10' : 'bg-slate-950 border-transparent text-slate-500 hover:text-slate-300'}`} onClick={() => setCurrentMapId(m.id)} onDoubleClick={() => setEditingMapId(m.id)}>
                                    {editingMapId === m.id ? <input autoFocus className="bg-transparent border-none text-xs font-bold outline-none w-20 text-white" defaultValue={m.name} onBlur={(e) => handleAction('renameMap', m.id, e.target.value)} onKeyDown={(e) => e.key==='Enter' && handleAction('renameMap', m.id, e.currentTarget.value)} /> : <span className="text-xs font-bold whitespace-nowrap">{m.name}</span>}
                                    <div className={`ml-2 flex items-center gap-1 ${currentMapId === m.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}><button onClick={(e) => { e.stopPropagation(); setMapToCopy(m); setCopyMapNameInput(m.name + " (副本)"); }} className="p-0.5 hover:text-blue-400"><Copy size={10}/></button><button onClick={(e) => { e.stopPropagation(); maps.length > 1 && setMapToDelete(m); }} className="p-0.5 hover:text-red-400"><X size={10}/></button></div>
                                </div>
                            ))}
                            <button onClick={() => setIsCreateMapModalOpen(true)} className="p-1.5 rounded bg-slate-800 text-slate-400 hover:text-white border border-slate-700 ml-1"><Plus size={14} /></button>
                        </div>
                        <div className="flex items-center space-x-3 mr-2">
                            <div className="flex items-center bg-slate-900 rounded border border-slate-700 p-0.5"><button onClick={() => setTransportMode('walk')} className={`px-2 py-1 rounded transition-all ${transportMode === 'walk' ? 'bg-slate-700 text-white' : 'opacity-40'}`}>🚶</button><button onClick={() => setTransportMode('drive')} className={`px-2 py-1 rounded transition-all ${transportMode === 'drive' ? 'bg-slate-700 text-white' : 'opacity-40'}`}>🚗</button></div>
                            <div onClick={toggleSound} className={`cursor-pointer p-2 rounded border border-slate-700 ${soundEnabled ? 'text-green-400 bg-green-900/10' : 'text-slate-500'}`}>{soundEnabled ? <Volume2 size={16}/> : <VolumeX size={16}/>}</div>
                            <div className="relative group bg-slate-800 border border-slate-700 px-3 py-1 rounded flex items-center space-x-2">
                                {mode === 'online' ? <Wifi size={14} className="text-emerald-400"/> : <WifiOff size={14} className="text-slate-400"/>}
                                <span className="text-xs font-bold">{mode==='online'?'連線中':'離線'}</span>
                                {mode === 'online' && (
                                    <div className="absolute top-full right-0 mt-2 w-48 bg-slate-900 border border-slate-700 rounded shadow-xl p-2 z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                                        <div className="text-[10px] font-bold text-slate-500 mb-2 uppercase border-b border-slate-800 pb-1">在線人員</div>
                                        {activeUsersList.map((u, i) => <div key={i} className="flex items-center gap-2 p-1 text-xs"><div className={`w-2 h-2 rounded-full ${u.isSelf ? 'bg-blue-500' : 'bg-emerald-500'}`}></div>{u.name}</div>)}
                                    </div>
                                )}
                            </div>
                            <div className="bg-slate-800 px-3 py-1.5 border border-slate-700 rounded cursor-pointer text-xs font-mono uppercase" onClick={() => { if(!isEditingName){ setIsEditingName(true); setNameInput(getCurrentUserName()); } }}>
                                {isEditingName ? <input className="bg-transparent border-b border-blue-500 w-20 outline-none" autoFocus value={nameInput} onChange={e=>setNameInput(e.target.value)} onBlur={e=>saveName(e.target.value)} onKeyDown={e=>e.key==='Enter' && saveName(e.target.value)} /> : `OP: ${getCurrentUserName()}`}
                            </div>
                        </div>
                    </header>
                    <div className="flex flex-1 overflow-hidden z-10 relative">
                        <aside className={`bg-slate-900 border-r border-slate-800 flex flex-col transition-all duration-300 ${isSidebarOpen?'w-72':'w-0 overflow-hidden'} ${panelClass}`}>
                            <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 text-sm font-semibold uppercase tracking-wider"><div className="flex items-center"><Layers size={14} className="mr-2"/> 控制面板</div><button onClick={()=>setIsSidebarOpen(false)} className="text-slate-500 hover:text-white"><ChevronLeft size={16}/></button></div>
                            <div className="p-4 flex bg-slate-950 p-1 rounded border border-slate-700/50 m-4 mt-2"><button onClick={()=>setInteractionMode('tactical')} className={`flex-1 py-1.5 rounded text-xs font-bold flex items-center justify-center gap-2 ${interactionMode==='tactical'?'bg-blue-600 text-white':'text-slate-500'}`}><Crosshair size={14}/> 戰術</button><button onClick={()=>setInteractionMode('map_edit')} className={`flex-1 py-1.5 rounded text-xs font-bold flex items-center justify-center gap-2 ${interactionMode==='map_edit'?'bg-indigo-600 text-white':'text-slate-500'}`}><Grid size={14}/> 編輯</button></div>
                            <div className="flex border-b border-slate-800"><button onClick={()=>setSidebarTab('filter')} className={`flex-1 py-3 text-xs font-bold uppercase border-b-2 ${sidebarTab==='filter'?'border-blue-500 text-blue-400':'border-transparent text-slate-500'}`}>篩選</button><button onClick={()=>setSidebarTab('manage')} className={`flex-1 py-3 text-xs font-bold uppercase border-b-2 ${sidebarTab==='manage'?'border-blue-500 text-blue-400':'border-transparent text-slate-500'}`}>管理</button><button onClick={()=>setSidebarTab('logs')} className={`flex-1 py-3 text-xs font-bold uppercase border-b-2 ${sidebarTab==='logs'?'border-blue-500 text-blue-400':'border-transparent text-slate-500'}`}>紀錄</button></div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {sidebarTab==='filter' && <div className="space-y-1"><div className="flex justify-between items-center mb-4 bg-slate-900/50 p-2 rounded border border-slate-800 text-[10px]"><p className="text-slate-500 uppercase">權限</p><div onClick={() => setIsEditMode(!isEditMode)} className="flex items-center gap-2 cursor-pointer"><span className={isEditMode?'text-emerald-400':'text-slate-500'}>{isEditMode?'編輯':'唯讀'}</span><div className={`w-8 h-4 rounded-full relative transition-colors ${isEditMode?'bg-emerald-600':'bg-slate-700'}`}><div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${isEditMode?'left-4':'left-0.5'}`}></div></div></div></div>{renderDynamicGroupList(markerGroups)}</div>}
                                {sidebarTab==='manage' && <div className="space-y-6"><div className="bg-slate-800/50 rounded border border-slate-700 p-3 text-xs font-bold uppercase mb-3"><div className="flex items-center gap-2 mb-3"><Database size={14}/> 備份</div><div className="grid grid-cols-2 gap-2"><button onClick={handleExport} className="py-2 bg-slate-900 rounded border border-slate-700 flex items-center justify-center gap-1"><Download size={12}/> 導出</button><div className="relative"><input ref={fileInputRef} type="file" onChange={handleImport} className="absolute inset-0 opacity-0 cursor-pointer"/><button className="w-full py-2 bg-slate-900 rounded border border-slate-700 flex items-center justify-center gap-1">{isImporting ? <Loader2 size={12} className="animate-spin"/> : <FileUp size={12}/>} 導入</button></div></div></div></div>}
                                {sidebarTab==='logs' && <div className="space-y-3">{actionLogs.map(log => <div key={log.id} className="border border-slate-800 rounded p-2 text-[10px] bg-slate-950/50"><div className="flex justify-between text-slate-500 mb-1"><span>{formatTime(log.timestamp)}</span><span>{log.user}</span></div><div className="text-slate-300">{log.desc}</div>{log.undo && <button onClick={()=>handleUndo(log)} className="mt-2 text-blue-400 flex items-center gap-1"><RotateCcw size={10}/> 還原</button>}</div>)}</div>}
                            </div>
                        </aside>
                        {!isSidebarOpen && <button onClick={()=>setIsSidebarOpen(true)} className="absolute top-4 left-4 z-30 p-2 bg-slate-800 border border-slate-700 rounded shadow-lg text-white"><Menu size={20}/></button>}
                        <main ref={mainRef} className={`flex-1 relative bg-black overflow-hidden ${interactionMode==='tactical' && isEditMode ? 'cursor-crosshair' : 'cursor-grab active:cursor-grabbing'}`} onMouseDown={startDrag} onMouseMove={onDrag} onMouseUp={stopDrag} onMouseLeave={stopDrag} onContextMenu={e=>e.preventDefault()} onClick={handleMapContainerClick}>
                            <div className="absolute origin-center transition-transform duration-75 ease-out" style={{transform:`translate(${offset.x}px,${offset.y}px) scale(${scale})`, width:'2000px', height:'2000px', top:'calc(50% - 1000px)', left:'calc(50% - 1000px)'}}>
                                <div ref={containerRef} className="w-full h-full grid grid-cols-16 grid-rows-16 border-2 border-slate-800 bg-[#020617] relative tactical-grid">
                                    {gridIds.map(id => <MapGridCell key={id} id={id} segment={currentSegments[id]} interactionMode={interactionMode} onClick={handleCellClick} />)}
                                    {currentMarkers.map(m => isMarkerVisible(m) && <MapMarker key={m.id} marker={draftMarker?.id === m.id ? draftMarker : m} scale={scale} isDragging={isDragging} onClick={handleMarkerClick} renderIcon={renderIcon} getGroup={getGroup} getStatus={getStatus} markerClass={markerClass} />)}
                                    {selectedMarker && draftMarker && <div className="absolute pointer-events-none z-[70]" style={{left:`${draftMarker.x}%`, top:`${draftMarker.y}%`, transform:`translate(-50%,-50%) scale(${1/scale})`}}><div className="w-1.5 h-1.5 bg-white rounded-full absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"/><div className="w-8 h-8 border border-emerald-500 rounded-full animate-ping opacity-50"/></div>}
                                </div>
                            </div>
                            <div className="absolute bottom-6 right-6 flex flex-col space-y-3 z-20"><button onClick={()=>{setScale(1);setOffset({x:0,y:0});}} className="p-3 bg-slate-800/90 hover:bg-blue-600 rounded-lg shadow-lg border border-slate-600"><Maximize size={20}/></button><div className="bg-slate-800/90 rounded-lg shadow-lg border border-slate-600 flex flex-col"><button onClick={()=>handleZoom('in')} className="p-3 hover:bg-slate-700 border-b border-slate-600"><Plus size={20}/></button><button onClick={()=>handleZoom('out')} className="p-3 hover:bg-slate-700"><Minus size={20}/></button></div></div>
                            <NotificationToast notifications={notifications} />
                        </main>

                        {selectedMarker && draftMarker && (
                            <aside className={`absolute right-0 top-0 h-full w-80 bg-slate-900/95 border-l border-slate-800 flex flex-col shadow-2xl z-[110] backdrop-blur animate-slideInRight ${panelClass}`}>
                                <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                                    <h2 className="text-sm font-bold text-white uppercase flex items-center gap-2"><Search size={16} className="text-blue-400"/> 標記情報</h2>
                                    <div className="flex items-center gap-3">
                                        {/* 整合至此處的刪除鍵 */}
                                        {isEditMode && (
                                            isDeleteConfirming ? (
                                                <div className="flex gap-1 animate-fadeIn">
                                                    <button onClick={() => handleAction('deleteMarker', selectedMarker.id)} className="text-[10px] bg-red-600 text-white px-2 py-1 rounded font-bold">確認</button>
                                                    <button onClick={() => setIsDeleteConfirming(false)} className="text-[10px] bg-slate-700 text-white px-2 py-1 rounded">取消</button>
                                                </div>
                                            ) : (
                                                <button onClick={() => setIsDeleteConfirming(true)} className="text-slate-500 hover:text-red-400 transition-colors" title="刪除此標記">
                                                    <Trash2 size={18}/>
                                                </button>
                                            )
                                        )}
                                        <button onClick={handleClosePanel} className="text-slate-500 hover:text-white"><X size={20}/></button>
                                    </div>
                                </div>
                                <div className={`flex-1 overflow-y-auto p-4 space-y-5 ${!isEditMode?'pointer-events-none opacity-80':''}`}>
                                    <div><label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase">狀態</label><div className="flex flex-wrap gap-2">{markerStatuses.map(s=>(<button key={s.id} onClick={()=>{setDraftMarker({...draftMarker, status: s.id});}} className={`px-2 py-1 rounded-full text-[10px] font-bold transition-all border ${draftMarker.status===s.id ? 'text-white' : 'bg-slate-900 border-slate-700 text-slate-400'}`} style={draftMarker.status===s.id ? {backgroundColor:s.color, borderColor:s.color} : {}}>{s.label}</button>))}</div></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase">類型</label><div className="space-y-3">{sortedGroups.filter(g => !g.parentId).map(parent => <div key={parent.id} className="bg-slate-800/30 rounded border border-slate-800 p-2"><button onClick={()=>{setLastUsedGroupId(parent.id);setDraftMarker({...draftMarker, type: parent.id});}} className={`w-full flex items-center gap-2 p-1.5 rounded ${draftMarker.type===parent.id ? 'bg-blue-600/20 border border-blue-500/50' : ''}`}>{renderIcon(parent.id, 14)}<span className="text-xs font-bold">{parent.label}</span></button></div>)}</div></div>
                                    <div><div className="flex justify-between text-[10px] text-slate-400 mb-2 uppercase"><span>尺寸</span><span className="text-blue-400">{tempSize}px</span></div><input type="range" min="16" max="64" value={tempSize} onChange={e=>{setTempSize(Number(e.target.value));setDraftMarker({...draftMarker, size: Number(e.target.value)});}} className="w-full accent-blue-500"/></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase">戰術備註</label><textarea value={tempNote} onChange={e=>{setTempNote(e.target.value);setDraftMarker({...draftMarker, note: e.target.value});}} placeholder="情報描述..." className="w-full h-24 bg-slate-950 border border-slate-700 rounded p-3 text-sm focus:border-blue-500 outline-none resize-none" /></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase">影像</label><div className="relative"><input type="file" accept="image/*" onChange={e=>e.target.files?.[0] && processImage(e.target.files[0],800, url => {setTempMarkerImg(url);setDraftMarker({...draftMarker, image: url});})} className="absolute inset-0 opacity-0 cursor-pointer"/><div className="flex items-center justify-center w-full py-3 bg-slate-800 border border-dashed border-slate-700 rounded text-xs"><Camera size={14} className="mr-2"/> {tempMarkerImg ? '更換' : '上傳'}</div></div>{tempMarkerImg && <div className="mt-3 relative group rounded overflow-hidden border border-slate-700" onClick={() => setLightboxImg(tempMarkerImg)}><img src={tempMarkerImg} className="w-full h-48 object-cover" /><button onClick={e=>{e.stopPropagation();setTempMarkerImg("");setDraftMarker({...draftMarker, image: ""});}} className="absolute top-2 right-2 bg-red-600 p-1 rounded-full"><Trash2 size={14}/></button></div>}</div>
                                </div>
                                <div className="p-4 border-t border-slate-800 bg-slate-900 text-center text-[10px] text-slate-500">座標: {draftMarker.x.toFixed(1)}, {draftMarker.y.toFixed(1)} | ID: {draftMarker.id.split('_').pop()}</div>
                            </aside>
                        )}
                    </div>
                    {activeCell && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-600 rounded-xl p-6 max-w-sm w-full shadow-2xl">
                                <h3 className="text-lg font-bold text-white mb-4 uppercase">區域 {activeCell}</h3>
                                <div className="mb-6 relative h-48 bg-slate-950 border border-dashed border-slate-700 rounded-lg overflow-hidden flex items-center justify-center"><input type="file" accept="image/*" onChange={e=>e.target.files?.[0] && processImage(e.target.files[0], 800, url => setTempImgUrl(url))} className="absolute inset-0 opacity-0 cursor-pointer z-10"/>{tempImgUrl ? <img src={tempImgUrl} className="w-full h-full object-cover" /> : <div className="text-slate-500 flex flex-col items-center"><ImageIcon size={32} className="mb-2"/><span className="text-xs">上傳影像</span></div>}</div>
                                <div className="flex justify-between"><button onClick={() => handleAction('lockSegment')} className="text-red-400 text-xs font-bold flex items-center gap-1"><Trash2 size={12}/> 重置</button><div className="flex gap-2"><button onClick={() => { setActiveCell(null); setTempImgUrl(""); }} className="px-4 py-2 text-slate-400 text-xs font-bold">取消</button><button onClick={() => handleAction('saveSegment')} disabled={!tempImgUrl} className="px-4 py-2 bg-blue-600 text-white rounded font-bold text-xs">儲存</button></div></div>
                            </div>
                        </div>
                    )}
                    {isCreateMapModalOpen && <div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4"><div className="bg-slate-900 border border-slate-600 rounded-xl p-6 max-w-sm w-full shadow-2xl"><h3 className="text-lg font-bold text-white mb-6 border-b border-slate-800 pb-4">建立戰區</h3><input type="text" value={newMapName} onChange={e=>setNewMapName(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded p-2.5 text-sm outline-none mb-6" placeholder="名稱..." autoFocus /><div className="flex justify-end gap-3"><button onClick={()=>setIsCreateMapModalOpen(false)} className="text-slate-400 text-xs">取消</button><button onClick={()=>handleAction('createMap', newMapName)} disabled={!newMapName.trim()} className="px-6 py-2 bg-blue-600 text-white rounded font-bold text-xs uppercase">建立</button></div></div></div>}
                    {mapToDelete && <div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4"><div className="bg-slate-900 border border-red-900/50 rounded-xl p-6 max-w-sm w-full"><h3 className="text-lg font-bold text-white mb-4">刪除地圖</h3><p className="text-slate-300 text-sm mb-6">確定刪除 "{mapToDelete.name}"？</p><div className="flex justify-end gap-3"><button onClick={() => setMapToDelete(null)} className="text-slate-400 text-xs">取消</button><button onClick={() => handleAction('deleteMap', mapToDelete.id)} className="px-6 py-2 bg-red-600 text-white rounded font-bold text-xs">確認</button></div></div></div>}
                    {mapToCopy && <div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4"><div className="bg-slate-900 border border-slate-600 rounded-xl p-6 max-w-sm w-full shadow-2xl"><h3 className="text-lg font-bold text-white mb-6 uppercase border-b border-slate-800 pb-4">複製地圖</h3><input type="text" autoFocus value={copyMapNameInput} onChange={e=>setCopyMapNameInput(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded p-2.5 text-sm mb-6" /><div className="flex justify-end gap-3"><button onClick={() => setMapToCopy(null)} className="text-slate-400 text-xs">取消</button><button onClick={() => handleAction('copyMap', mapToCopy.id, copyMapNameInput)} className="px-6 py-2 bg-blue-600 text-white rounded font-bold text-xs">複製</button></div></div></div>}
                    {lightboxImg && <div className="fixed inset-0 bg-black/90 z-[300] flex items-center justify-center p-4" onClick={() => setLightboxImg(null)}><img src={lightboxImg} className="max-w-full max-h-full object-contain animate-fadeIn" /><button onClick={()=>setLightboxImg(null)} className="absolute top-6 right-6 text-white"><X size={32}/></button></div>}
                </ErrorBoundary>
            );
        }
        createRoot(document.getElementById('root')).render(React.createElement(TacticalMap));
    </script>
</body>
</html>
