<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            databaseURL: "https://icarus2-50e01-default-rtdb.firebaseio.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };

        let globalFirebase = null;
        function getFirebaseContext() {
            if (globalFirebase) return globalFirebase;
            const app = window.FirebaseSDK.initializeApp(firebaseConfig);
            const auth = window.FirebaseSDK.getAuth(app);
            let db;
            try {
                db = window.FirebaseSDK.initializeFirestore(app, {
                    localCache: window.FirebaseSDK.persistentLocalCache({
                        tabManager: window.FirebaseSDK.persistentMultipleTabManager()
                    })
                });
            } catch (e) {
                db = window.FirebaseSDK.getFirestore(app);
            }
            globalFirebase = { app, auth, db };
            return globalFirebase;
        }

        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const gcj02towgs84 = (lng, lat) => {
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };
            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };
            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [lng * 2 - mglng, lat * 2 - mglat];
        };

        const wgs84togcj02 = (lng, lat) => {
            if (lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271) return [lng, lat];
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };
            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };
            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [mglng, mglat];
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const decoratorLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '&copy; 高德地圖'
                }).addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                if (tempMarkerRef.current) { map.removeLayer(tempMarkerRef.current); tempMarkerRef.current = null; }
                if (tempMarker) {
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-xl bg-red-500 animate-bounce" style="z-index: 2000;">📍</div>`;
                    const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                    const [gLng, gLat] = wgs84togcj02(tempMarker.lng, tempMarker.lat);
                    const marker = L.marker([gLat, gLng], { icon: customIcon }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map);
                    marker.openPopup();
                    map.setView([gLat, gLng], 15, { animate: true });
                    tempMarkerRef.current = marker;
                }
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => {
                         const [gLng, gLat] = wgs84togcj02(p.lng, p.lat);
                         return [gLat, gLng];
                     }));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6';
                const validPlaces = places.filter(p => p.lat && p.lng);
                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode || 'drive'}-${p.routeIndex || 0}`)) + markerColor + routeColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => {
                    if (map.hasLayer(markersRef.current[id].marker)) map.removeLayer(markersRef.current[id].marker);
                    delete markersRef.current[id];
                });
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline);
                    if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main);
                    if (decoratorLayersRef.current[key]) map.removeLayer(decoratorLayersRef.current[key]);
                    if (layers.alts) layers.alts.forEach(altLayer => { if (map.hasLayer(altLayer)) map.removeLayer(altLayer); });
                    delete routeLayersRef.current[key];
                    delete decoratorLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    // ===== 處理重疊點位微調（約 20 公尺） =====
                    const posCounter = {};
                    const offsetStep = 0.00018; // 調大步長以達到約 20 公尺

                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        let [gLng, gLat] = wgs84togcj02(place.lng, place.lat);
                        const posKey = `${place.lng.toFixed(6)},${place.lat.toFixed(6)}`;
                        
                        if (!posCounter[posKey]) {
                            posCounter[posKey] = 0;
                        } else {
                            posCounter[posKey]++;
                            const angle = (posCounter[posKey] * (Math.PI * 2)) / 8;
                            gLng += Math.cos(angle) * offsetStep;
                            gLat += Math.sin(angle) * offsetStep;
                        }

                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.4);' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 16] });
                        
                        // ===== 卡片指向時置頂 (Z-Index) =====
                        const marker = L.marker([gLat, gLng], { 
                            icon: customIcon, 
                            zIndexOffset: isHovered ? 10000 : (index * 10) 
                        }).addTo(map);
                        
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i]; const p2 = validPlaces[i + 1];
                                if (p1.lat === p2.lat && p1.lng === p2.lng) continue;
                                const travelMode = p1.travelMode || 'drive';
                                const segmentKey = `${p1.id}-${p2.id}-${p1.lat},${p1.lng}-${p2.lat},${p2.lng}-${travelMode}`;
                                let geoData = window.routeCache ? window.routeCache[segmentKey] : null;
                                if (!geoData) {
                                    if (travelMode === 'straight') geoData = ['straight_line'];
                                    else {
                                        const profile = travelMode === 'walk' ? 'foot' : 'driving';
                                        const url = `https://router.project-osrm.org/route/v1/${profile}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson&alternatives=true`;
                                        try {
                                            const res = await fetch(url);
                                            const data = await res.json();
                                            geoData = (data.code === 'Ok' && data.routes?.length > 0) ? data.routes.map(r => r.geometry) : ['straight_line'];
                                        } catch (e) { geoData = ['straight_line']; }
                                        if (!window.routeCache) window.routeCache = {}; window.routeCache[segmentKey] = geoData;
                                    }
                                }
                                if (!isMounted || !mapInstanceRef.current) return;
                                let outline, main; const geometries = Array.isArray(geoData) ? geoData : [geoData];
                                const selectedIndex = p1.routeIndex || 0;
                                const mainGeo = geometries[selectedIndex] || geometries[0];

                                if (mainGeo === 'straight_line') {
                                    const [gLng1, gLat1] = wgs84togcj02(p1.lng, p1.lat); const [gLng2, gLat2] = wgs84togcj02(p2.lng, p2.lat);
                                    outline = L.polyline([[gLat1, gLng1], [gLat2, gLng2]], outlineStyle).addTo(mapInstanceRef.current);
                                    main = L.polyline([[gLat1, gLng1], [gLat2, gLng2]], mainStyle).addTo(mapInstanceRef.current);
                                } else {
                                    const geoGCJ = JSON.parse(JSON.stringify(mainGeo));
                                    if(geoGCJ.coordinates) geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                    outline = L.geoJSON(geoGCJ, { style: outlineStyle }).addTo(mapInstanceRef.current);
                                    main = L.geoJSON(geoGCJ, { style: mainStyle }).addTo(mapInstanceRef.current);
                                }
                                
                                const arrowDecorator = L.polylineDecorator(main, {
                                    patterns: [
                                        { offset: '5%', repeat: '60px', symbol: L.Symbol.arrowHead({ pixelSize: 10, polygon: false, pathOptions: { stroke: true, color: '#FFFFFF', weight: 3, opacity: 0.9 } }) }
                                    ]
                                }).addTo(mapInstanceRef.current);
                                decoratorLayersRef.current[segmentKey] = arrowDecorator;

                                if (main.bringToFront) main.bringToFront();
                                routeLayersRef.current[segmentKey] = { outline, main, p1Id: p1.id, p2Id: p2.id, baseColor: routeColor };
                                await new Promise(resolve => setTimeout(resolve, 30));
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            // ===== 指向卡片時即時置頂點位 =====
            useEffect(() => {
                Object.entries(markersRef.current).forEach(([placeId, data]) => {
                    const { marker, index, baseColor } = data;
                    if (!marker) return;
                    const isHovered = hoveredId === placeId;
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${baseColor}; ${isHovered ? 'transform: scale(1.4);' : ''}">${index + 1}</div>`;
                    marker.setIcon(L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 16] }));
                    marker.setZIndexOffset(isHovered ? 10000 : (index * 10));
                    if (isHovered && !data.isHovered) marker.openPopup(); else if (!isHovered && data.isHovered) marker.closePopup();
                    data.isHovered = isHovered;
                });
            }, [hoveredId]);

            useEffect(() => {
                Object.values(routeLayersRef.current).forEach(data => {
                    const { main, p1Id, p2Id, baseColor } = data;
                    if (!main) return;
                    const isHovered = hoveredSegmentId === `${p1Id}-${p2Id}`;
                    if (isHovered) { main.setStyle({ color: '#f59e0b', weight: 10 }); if (main.bringToFront) main.bringToFront(); } 
                    else { main.setStyle({ color: baseColor, weight: 8 }); }
                });
            }, [hoveredSegmentId]);
            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

        // 以下為 Dashboard, TripPlanner, MainApp 組件，保持不變，僅注入修正後的 RealMap
        function Dashboard({ trips, onCreateTrip, onSelectTrip, onDeleteTrip, onImportTrip, onExportTrip, toast }) {
            const fileInputRef = useRef(null);
            return (
                <div className="flex justify-center h-full bg-[#0f172a] overflow-y-auto w-full relative">
                    {toast && (<div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 border border-slate-700"><span>{toast}</span></div></div>)}
                    <div className="max-w-[960px] w-full px-4 md:px-0">
                        <div className="my-10"><h1 className="text-3xl font-bold mb-4 text-slate-100">我的行程</h1></div>
                        <div className="my-8 flex justify-end gap-3 flex-wrap">
                            <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={onImportTrip} />
                            <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition-all cursor-pointer border border-slate-600"><Icons.Upload size={20} /> 匯入行程</button>
                            <button onClick={onCreateTrip} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-900/30 transition-all cursor-pointer"><Icons.Plus size={20} /> 建立新行程</button>

                                            <div className="p-5 flex-1 flex flex-col justify-end bg-slate-800 relative z-10 -mt-4 rounded-t-xl"><h3 className="font-bold text-lg text-slate-100 truncate">{tripData.trip?.title || '未命名行程'}</h3><p className="text-sm text-slate-400 mt-1">{tripData.trip?.dates || '未設定日期'}</p></div>

                                        </div>

                    </div>

            );
        }

        function TripPlanner({ tripId, onBack, db, appId, user }) {
            const [trip, setTrip] = useState({ title: '', dates: '', days: [] });
            const [members, setMembers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [shoppingItems, setShoppingItems] = useState([]);

            const AMAP_KEY = '3bf27a17038b433640ab774dafa1d0a6'; 
            const [activeTab, setActiveTab] = useState('itinerary');

            const [panelMode, setPanelMode] = useState('list');

            const [newShoppingItem, setNewShoppingItem] = useState({ name: '', qty: 1, price: 0, currency: 'MOP', requester: '', note: '', image: null });
            const searchTimeoutRef = useRef(null);
            const daysContainerRef = useRef(null);
            const [expandedNotes, setExpandedNotes] = useState({});
            const [showExpenseModal, setShowExpenseModal] = useState(false);

            const [placeToDelete, setPlaceToDelete] = useState(null);
            const [expenseToDelete, setExpenseToDelete] = useState(null);

            useEffect(() => {

                    if (activeTab !== 'itinerary') return;

                    for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf('image') !== -1) { imageFile = items[i].getAsFile(); break; } }
                    if (imageFile) {
                        const current = stateRef.current;
                        let targetPlaceId = null;
                        if (current.panelMode === 'edit' && current.newItem.id) { targetPlaceId = current.newItem.id; } else if (current.hoveredPlaceId) { targetPlaceId = current.hoveredPlaceId; }
                        if (targetPlaceId) {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const img = new Image();
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    let w = img.width, h = img.height;
                                    if (w > h) { if (w > 800) { h *= 800/w; w = 800; } } else { if (h > 800) { w *= 800/h; h = 800; } }
                                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                    const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                                    const targetPlace = current.trip.days.flatMap(d => d.places).find(p => p.id === targetPlaceId);
                                    const targetName = targetPlace?.name;
                                    const newDays = current.trip.days.map(d => ({
                                        ...d,
                                        places: d.places.map(p => {
                                            if (p.id === targetPlaceId || (targetName && p.name === targetName)) return { ...p, image: imageDataUrl };
                                            return p;
                                        })
                                    }));
                                    pushUpdate({ trip: { ...current.trip, days: newDays } });
                                    showMsg('✅ 圖片已同步同名卡片！');
                                };
                                img.src = event.target.result;
                            };
                            reader.readAsDataURL(imageFile);
                        }
                    }
                };
                document.addEventListener('paste', handleGlobalPaste);
                return () => document.removeEventListener('paste', handleGlobalPaste);
            }, [activeTab]);

            const handleAddressInput = (e) => {
                const val = e.target.value; setNewItem(p => ({...p, address: val}));
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                if (!val.trim()) { setAddressSuggestions([]); return; }
                searchTimeoutRef.current = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(val)}&offset=5&page=1&key=${AMAP_KEY}`);
                        const data = await res.json();
                        if (data.status === '1' && data.pois) setAddressSuggestions(data.pois);
                    } catch(e) {}
                }, 800);
            };

            const handleSuggestionClick = (s) => {
                const name = s.name;
                const addr = s.address && s.address.length > 0 ? s.address : s.adname;
                setNewItem(p => ({...p, address: addr, name: p.name || name}));
                if (s.location) {
                    const [lngStr, latStr] = s.location.split(',');
                    const [wgsLng, wgsLat] = gcj02towgs84(parseFloat(lngStr), parseFloat(latStr));
                    setTempMarker({ lat: wgsLat, lng: wgsLng, name });
                }
                setAddressSuggestions([]);
            };

            const handleAddressSearch = async () => {
                if (!newItem.address) return showMsg("請先輸入地址或關鍵字！");
                setIsSearchingAddress(true);
                try {
                    const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(newItem.address)}&offset=1&page=1&key=${AMAP_KEY}`);
                    const data = await res.json();
                    if (data.status === '1' && data.pois && data.pois.length > 0) {
                        const s = data.pois[0];
                        const [lngStr, latStr] = s.location.split(',');
                        const [wgsLng, wgsLat] = gcj02towgs84(parseFloat(lngStr), parseFloat(latStr));
                        setTempMarker({ lat: wgsLat, lng: wgsLng, name: s.name });
                        if (!newItem.name) setNewItem(prev => ({...prev, name: s.name}));
                        showMsg("已找到地點！");
                    } else showMsg("找不到該地點。");
                } catch(e) { showMsg("搜尋時發生錯誤。"); }
                setIsSearchingAddress(false);
            };

            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                const lat = tempMarker ? tempMarker.lat : 22.5 + Math.random()*0.1;
                const lng = tempMarker ? tempMarker.lng : 114.1 + Math.random()*0.1;
                const targetName = newItem.name;
                const newP = { id: 'p' + Date.now(), ...newItem, lat, lng, travelMode: 'drive', routeIndex: 0 };
                const newDays = trip.days.map(d => ({
                    ...d,
                    places: d.places.map(p => (p.name === targetName ? { ...p, address: newItem.address || p.address, lat, lng } : p))
                }));
                const dayIndex = newDays.findIndex(d => d.id === activeDayId);
                if (dayIndex !== -1) newDays[dayIndex].places.push(newP);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                const targetName = newItem.name;
                const lat = tempMarker ? tempMarker.lat : null;
                const lng = tempMarker ? tempMarker.lng : null;
                const newDays = trip.days.map(d => ({
                    ...d,
                    places: d.places.map(p => {
                        if (p.id === newItem.id) {
                            return { ...p, name: newItem.name, note: newItem.note, type: newItem.type, time: newItem.time, stayTime: newItem.stayTime || '1', address: newItem.address || p.address, ...(lat ? { lat, lng } : {}) };
                        } else if (p.name === targetName) {
                            return { ...p, address: newItem.address || p.address, ...(lat ? { lat, lng } : {}) };
                        }
                        return p;
                    })
                }));
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            const handleUpdateTravelMode = (dayId, placeId, newMode) => {
                const newDays = trip.days.map(d => d.id === dayId ? { ...d, places: d.places.map(p => p.id === placeId ? { ...p, travelMode: newMode, routeIndex: 0 } : p) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
            };

            const handleUpdateRouteIndex = (dayId, placeId, index) => {
                const newDays = trip.days.map(d => d.id === dayId ? { ...d, places: d.places.map(p => p.id === placeId ? { ...p, routeIndex: index } : p) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
            };

            const confirmDeletePlace = () => {
                const newDays = trip.days.map(d => String(d.id) === String(activeDayId) ? { ...d, places: d.places.filter(p => p.id !== placeToDelete) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPlaceToDelete(null); setPanelMode('list');
            };

            const toggleNote = (placeId, e) => { e.stopPropagation(); setExpandedNotes(prev => ({ ...prev, [placeId]: !prev[placeId] })); };

            const handleDragStart = (e, idx, pId) => { if (dragEnabledId !== pId) { e.preventDefault(); return; } setDraggedPlaceIndex(idx); e.dataTransfer.effectAllowed = 'move'; if (e.dataTransfer.setData) e.dataTransfer.setData('text/plain', ''); };
            const handleDrop = (e, dropIdx) => { e.preventDefault(); if (draggedPlaceIndex === null || draggedPlaceIndex === dropIdx) return; const newPs = [...activeDayData.places]; const item = newPs.splice(draggedPlaceIndex, 1)[0]; newPs.splice(dropIdx, 0, item); const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: newPs } : d); pushUpdate({ trip: { ...trip, days: newDays } }); setDraggedPlaceIndex(null); setDragEnabledId(null); };
            const handleDragEnd = () => { setDraggedPlaceIndex(null); setDragEnabledId(null); };

            const isDraggingDay = useRef(false);
            const dragStartX = useRef(0);
            const dragScrollLeft = useRef(0);
            const dragHasMoved = useRef(false); 

            const [jpyToHkdRate] = React.useState(0.0496); const [jpyToTwdRate] = React.useState(0.215); const [jpyToMopRate] = React.useState(0.0511);
            const currentExchangeRate = useMemo(() => { switch(displayCurrency) { case 'HKD': return jpyToHkdRate; case 'TWD': return jpyToTwdRate; case 'MOP': return jpyToMopRate; default: return 1; } }, [displayCurrency, jpyToHkdRate, jpyToTwdRate, jpyToMopRate]);
            const getRateToJPY = (currency) => { switch(currency) { case 'HKD': return 1 / jpyToHkdRate; case 'TWD': return 1 / jpyToTwdRate; case 'MOP': return 1 / jpyToMopRate; default: return 1; } };
            const filteredExpenses = useMemo(() => { if (!expenses) return []; let result = expenseFilter === 'all' ? [...expenses] : expenses.map(day => ({...day, items: day.items.filter(item => item.payer === expenseFilter || (item.sharedBy && item.sharedBy.includes(expenseFilter)))})).filter(day => day.items.length > 0); return result.sort((a, b) => new Date(b.date) - new Date(a.date)); }, [expenses, expenseFilter]);
            const filteredTotalStats = useMemo(() => { let totalJPY = 0; filteredExpenses.forEach(d => d.items.forEach(i => totalJPY += i.amountJPY)); return { jpy: totalJPY, display: Math.round(totalJPY * currentExchangeRate) }; }, [filteredExpenses, currentExchangeRate]);
            const shoppingTotalStats = useMemo(() => { let totalJPY = 0; shoppingItems.forEach(item => { totalJPY += item.price * item.qty; }); return { jpy: Math.round(totalJPY), display: Math.round(totalJPY * currentExchangeRate) }; }, [shoppingItems, currentExchangeRate]); 

            const handleAddExpenseSubmit = (e) => { e.preventDefault(); let finalAmountJPY = Number(newExpenseItem.amount) * getRateToJPY(newExpenseItem.currency); const newExpense = { id: 'e_' + Date.now(), payer: newExpenseItem.payer, title: newExpenseItem.title, category: newExpenseItem.category, sharedBy: newExpenseItem.sharedBy, amountJPY: Math.round(finalAmountJPY), image: newExpenseItem.image }; const newExpenses = [...expenses]; const dayIndex = newExpenses.findIndex(d => d.date === newExpenseItem.date); if (dayIndex >= 0) newExpenses[dayIndex].items.push(newExpense); else newExpenses.push({ date: newExpenseItem.date, items: [newExpense] }); pushUpdate({ expenses: newExpenses.sort((a, b) => new Date(a.date) - new Date(b.date)) }); setShowExpenseModal(false); setNewExpenseItem({ date: '2026-04-03', title: '', category: 'food', payer: members[0]?.name, amount: '', currency: 'JPY', sharedBy: members.map(m => m.name), image: null }); };
            const confirmDeleteExpense = () => { if (expenseToDelete) { pushUpdate({ expenses: expenses.map(day => ({...day, items: day.items.filter(item => item.id !== expenseToDelete.id)})).filter(day => day.items.length > 0) }); setExpenseToDelete(null); } };
            const handleAddShoppingSubmit = (e) => { e.preventDefault(); let jpyPrice = Number(newShoppingItem.price) * getRateToJPY(newShoppingItem.currency); pushUpdate({ shoppingItems: [...shoppingItems, { id: 's_' + Date.now(), ...newShoppingItem, qty: Number(newShoppingItem.qty), price: Math.round(jpyPrice), currency: newShoppingItem.currency, requester: members[0]?.name, note: '', image: null }] }); setShowShoppingModal(false); setNewShoppingItem({ name: '', qty: 1, price: 0, currency: 'MOP', requester: members[0]?.name, note: '', image: null }); };
            const confirmDeleteShopping = () => { if (shoppingToDelete) { pushUpdate({ shoppingItems: shoppingItems.filter(item => item.id !== shoppingToDelete) }); setShoppingToDelete(null); } };
            const filteredPackingList = useMemo(() => { if (!packingList) return []; if (packingFilter === 'all') return packingList; return packingList.filter(item => item.owner === packingFilter || item.owner === 'all'); }, [packingList, packingFilter]);
            const handleAddPacking = (e) => { e.preventDefault(); if (!newPackingItem.text) return; pushUpdate({ packingList: [...packingList, { id: 'pk'+Date.now(), text: newPackingItem.text, checked: false, owner: newPackingItem.owner }] }); setNewPackingItem({ text: '', owner: '' }); setShowPackingModal(false); };
            const togglePacking = (id) => pushUpdate({ packingList: packingList.map(i => i.id === id ? { ...i, checked: !i.checked } : i) });
            const deletePacking = (e, id) => { e.stopPropagation(); pushUpdate({ packingList: packingList.filter(i => i.id !== id) }); };

            const settlementResult = useMemo(() => { const balances = {}; members.forEach(m => balances[m.name] = 0); expenses.forEach(day => day.items.forEach(item => { const splitBy = item.sharedBy || []; if (splitBy.length === 0) return; const splitAmount = item.amountJPY / splitBy.length; if (balances[item.payer] !== undefined) balances[item.payer] += item.amountJPY; splitBy.forEach(person => { if (balances[person] !== undefined) balances[person] -= splitAmount; }); })); const debtors = []; const creditors = []; Object.entries(balances).forEach(([name, amount]) => { if (amount < -1) debtors.push({ name, amount }); if (amount > 1) creditors.push({ name, amount }); }); debtors.sort((a, b) => a.amount - b.amount); creditors.sort((a, b) => b.amount - a.amount); const transactions = []; let i = 0; let j = 0; while (i < debtors.length && j < creditors.length) { const debtor = debtors[i]; const creditor = creditors[j]; const amount = Math.min(Math.abs(debtor.amount), creditor.amount); transactions.push({ from: debtor.name, to: creditor.name, amount: amount }); debtor.amount += amount; creditor.amount -= amount; if (Math.abs(debtor.amount) < 1) i++; if (creditor.amount < 1) j++; } return { balances, transactions }; }, [expenses, members]);
            const toggleSharedMember = (m) => setNewExpenseItem(prev => { const shared = prev.sharedBy.includes(m) ? (prev.sharedBy.length > 1 ? prev.sharedBy.filter(name => name !== m) : prev.sharedBy) : [...prev.sharedBy, m]; return { ...prev, sharedBy: shared }; });
            const handleAddDay = () => { const newId = trip.days.length > 0 ? Math.max(...trip.days.map(d => d.id)) + 1 : 1; pushUpdate({ trip: { ...trip, days: [...trip.days, { id: newId, date: getFutureDate(newId - 1), title: '新的一天', color: '#3b82f6', weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }, places: [] }] } }); setActiveDayId(newId); };

            const handlePlaceImageUpload = (dayId, placeId, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > 800) { h *= 800/w; w = 800; } } else { if (h > 800) { w *= 800/h; h = 800; } }
                        canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        const targetPlace = trip.days.flatMap(d => d.places).find(p => p.id === placeId);
                        const targetName = targetPlace?.name;
                        pushUpdate({ 
                            trip: { 
                                ...trip, 
                                days: trip.days.map(d => ({
                                    ...d,
                                    places: d.places.map(p => {
                                        if (p.id === placeId || (targetName && p.name === targetName)) return { ...p, image: imageDataUrl };
                                        return p;
                                    })
                                })) 
                            } 
                        });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 font-sans relative">
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full border border-slate-700 shadow-2xl font-bold tracking-wide"><span>{toast}</span></div></div>}
                    {previewImage && <div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4 animate-fade-in" onClick={() => setPreviewImage(null)}><button className="absolute top-4 right-4 p-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-colors shadow-lg"><Icons.X size={24} /></button><img src={previewImage} className="max-w-full max-h-full object-contain" /></div>}
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">
                        <div className="flex items-center gap-3 flex-1">

            useEffect(() => { const initAuth = async () => { try { await window.FirebaseSDK.signInAnonymously(auth); } catch (e) {} }; initAuth(); return window.FirebaseSDK.onAuthStateChanged(auth, setUser); }, [auth]);
            useEffect(() => { if (!user) return; const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips'); return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => { const fetchedTrips = []; snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); }); if (snapshot.empty) { const newTripId = 'trip_sz-macau'; window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId), INITIAL_TRIP_DATA); } setTrips(fetchedTrips.sort((a, b) => b.id.localeCompare(a.id))); }, (error) => { console.error("Firestore error:", error); }); }, [user, db, appId]);
            const handleExportTrip = (tripData) => { const dataStr = JSON.stringify(tripData, null, 2); const blob = new Blob([dataStr], { type: "application/json" }); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = `${tripData.trip?.title || 'trip'}.json`; link.click(); URL.revokeObjectURL(url); showMsg("導出成功"); };
            const handleImportTrip = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async (event) => { try { const importedData = JSON.parse(event.target.result); if (!importedData.trip) return showMsg("格式錯誤"); const newTripId = 'trip_imp_' + Date.now(); importedData.id = newTripId; if (importedData.trip) importedData.trip.id = newTripId; await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId), importedData); showMsg("匯入成功！"); } catch (err) { showMsg("無效檔案"); } e.target.value = ''; }; reader.readAsText(file); };
            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={async () => { const nid = 'trip_' + Date.now(); await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', nid), { trip: { id: nid, title: '新行程', dates: getFutureDate(0), icon: '🚀', days: [{id: 1, title: 'Day 1', date: getFutureDate(0), places: [], weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }}] }, members: [{ id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' }], expenses: [], shoppingItems: [], packingList: [] }); setActiveTripId(nid); setCurrentView('planner'); }} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={async (id) => { if (confirm("確定刪除行程？")) await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', id)); }} onImportTrip={handleImportTrip} onExportTrip={handleExportTrip} toast={toast} />;
            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
